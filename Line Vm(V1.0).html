<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Line Player - Vm V1.0 By Jai (LINE128 Z80 Chip)</title>
    <style>
        :root {
            /* Classic Black & Grey aesthetic for standard Line OS games */
            --case-color: #1a1a1c;
            --screen-bg: #b4b4b4; 
            --screen-pixel: #111111;
        }

        body {
            background-color: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #eee;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        /* --- HARDWARE --- */
        #line-player-case {
            background-color: var(--case-color);
            padding: 25px;
            border-radius: 10px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 15px 35px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #111;
            position: relative;
        }

        .brand-logo {
            color: #aaa;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 14px;
            margin-bottom: 2px;
            text-transform: uppercase;
            font-family: sans-serif;
            text-shadow: 0 1px 0 rgba(255,255,255,0.1);
        }

        .hardware-spec {
            color: #666;
            font-size: 9px;
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-family: 'Courier New', monospace;
        }

        #screen-bezel {
            background-color: #222;
            padding: 15px 20px;
            border-radius: 5px 5px 20px 5px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
        }

        /* The Screen */
        #screen-viewport {
            width: 480px;
            height: 320px;
            background-color: var(--screen-bg);
            border: 3px solid #111;
            position: relative;
            overflow: hidden;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4);
            transition: width 0.3s, height 0.3s;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.3s;
        }
        .scanlines.hidden { opacity: 0; }

        /* --- CONTROLS --- */
        .controls-area { width: 100%; padding: 0 10px; box-sizing: border-box; }
        .controls-hint { font-size: 10px; text-align: center; opacity: 0.5; margin-top: 5px; }
        .key {
            display: inline-block;
            background: #333;
            border-bottom: 2px solid #111;
            border-radius: 4px;
            padding: 4px 8px;
            margin: 2px;
            font-weight: bold;
            color: white;
            font-size: 10px;
        }

        /* --- UI OVERLAYS --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--screen-pixel);
            z-index: 60;
            background-color: var(--screen-bg);
        }

        #menu-list li { padding: 5px; cursor: pointer; border: 1px solid transparent; }
        #menu-list li:hover { background-color: rgba(0,0,0,0.05); }

        /* Modal for Input */
        #modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        textarea {
            width: 90%; height: 50%;
            background: #222; color: #bbb;
            border: 1px solid #444;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            resize: none;
        }
        .modal-buttons { display:flex; gap:10px; margin-top:10px; }
        .modal-btn {
            padding: 8px 15px;
            background: #444; color: white; border: none; cursor: pointer;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 10px;
        }
        .modal-btn:hover { background: #555; }
    </style>
</head>
<body>

    <div id="line-player-case">
        <div class="brand-logo">Z-Line Player</div>
        <div class="hardware-spec">LINE128 Z80 CHIP | LGC GPU | VIRTUAL KERNEL</div>
        
        <div id="screen-bezel">
            <div id="screen-viewport">
                <canvas id="gameCanvas" width="128" height="96"></canvas>
                <div class="scanlines" id="scanlines"></div>
                
                <div id="ui-layer">
                    <div id="z80-registers" style="font-size: 8px; color: rgba(17, 17, 17, 0.8); border-bottom: 1px dashed currentColor; padding-bottom: 2px; margin-bottom: 4px; display: flex; justify-content: space-between;">
                        <span id="reg-af">AF:0000</span>
                        <span id="reg-bc">BC:0000</span>
                        <span id="reg-de">DE:0000</span>
                        <span id="reg-hl">HL:0000</span>
                        <span id="reg-pc">PC:0100</span>
                    </div>

                    <div style="border-bottom: 2px solid currentColor; margin-bottom: 5px; display:flex; justify-content:space-between;">
                        <span>Line Vm V1.0 (Native Z80)</span>
                        <span id="clock">12:00</span>
                    </div>
                    <ul id="menu-list" style="list-style:none; padding:0; flex-grow:1; overflow-y:auto; margin:0;">
                    </ul>
                    <div style="font-size:0.8em; opacity:0.8; border-top:1px solid currentColor; padding-top:2px;">
                        NAV: D-PAD | SEL: Z | OPT: C | BACK: ESC
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-area">
            <div class="controls-hint">
                <span class="key"><span class="t-btn" data-key="up">↑</span><span class="t-btn" data-key="down">↓</span><span class="t-btn" data-key="left">←</span><span class="t-btn" data-key="right">→</span></span> LOOK &nbsp;
                <span class="key"><span class="t-btn" data-key="w">W</span><span class="t-btn" data-key="a_key">A</span><span class="t-btn" data-key="s">S</span><span class="t-btn" data-key="d">D</span></span> MOVE &nbsp;
                <span class="key t-btn" data-key="space">SPACE</span> JUMP &nbsp;
                <span class="key t-btn" data-key="a">Z</span> A &nbsp;
                <span class="key t-btn" data-key="b">X</span> B &nbsp;
                <span class="key t-btn" data-key="y">Y</span> Y &nbsp;
                <span class="key t-btn" data-key="c">C</span> OPT &nbsp;
                <span class="key t-btn" data-key="back">ESC</span> BACK
            </div>
            <div style="text-align:center; font-size:9px; color:#666; margin-top:5px;">
                True Native Line OS - Hardware Limits Active
            </div>
        </div>
        
        <input type="file" id="file-loader" style="display:none;" accept=".txt,.lmf,.lmt,.ch8,.ch81,.bas,.lmv,.lmp">
        <input type="file" id="ls-loader" style="display:none;" accept=".ls">
        <input type="file" id="media-loader" style="display:none;" accept="video/mp4,video/webm,image/png,image/jpeg,image/gif">
        <video id="hidden-video" style="display:none;" muted playsinline></video>
        <img id="hidden-image" style="display:none;">
        <canvas id="hidden-canvas" width="128" height="96" style="display:none;"></canvas>
    </div>

    <div id="modal-overlay">
        <div id="modal-title" style="color:white; font-family:sans-serif; margin-bottom:10px; font-weight:bold;"></div>
        <textarea id="modal-input" placeholder="..."></textarea>
        <div class="modal-buttons">
            <button class="modal-btn" id="modal-action-btn-1">ACTION 1</button>
            <button class="modal-btn" id="modal-action-btn-2" style="display:none;">ACTION 2</button>
            <button class="modal-btn" onclick="closeModal()">CLOSE</button>
        </div>
        <div id="modal-status" style="color:#0f0; font-family:monospace; margin-top:10px; line-height:1.2; text-align:center;"></div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const uiLayer = document.getElementById('ui-layer');
const menuList = document.getElementById('menu-list');
const videoElement = document.getElementById('hidden-video');
const imageElement = document.getElementById('hidden-image');
const offscreenCanvas = document.getElementById('hidden-canvas');
const offCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

// --- LINE128 Z80 HARDWARE CHIP ---
// Re-engineered from Sharp LR35902. Detached from Nintendo MMU.
const _line128_regBuf = new ArrayBuffer(12);
const _line128_reg8 = new Uint8Array(_line128_regBuf);
const _line128_reg16 = new Uint16Array(_line128_regBuf);

const LINE128_CHIP = {
    clock:{t:0}, ime:0, halt:0, _eiDelay: false,
    memory: new Uint8Array(65536), // 64KB Z80 RAM
    _ie:0, _if:0, _doubleSpeed:false, _key1:0,

    r: {
        get f() { return _line128_reg8[0]; }, set f(v) { _line128_reg8[0] = v & 0xF0; },
        get a() { return _line128_reg8[1]; }, set a(v) { _line128_reg8[1] = v; },
        get af() { return _line128_reg16[0]; }, set af(v) { _line128_reg16[0] = v & 0xFFF0; },
        get c() { return _line128_reg8[2]; }, set c(v) { _line128_reg8[2] = v; },
        get b() { return _line128_reg8[3]; }, set b(v) { _line128_reg8[3] = v; },
        get bc() { return _line128_reg16[1]; }, set bc(v) { _line128_reg16[1] = v; },
        get e() { return _line128_reg8[4]; }, set e(v) { _line128_reg8[4] = v; },
        get d() { return _line128_reg8[5]; }, set d(v) { _line128_reg8[5] = v; },
        get de() { return _line128_reg16[2]; }, set de(v) { _line128_reg16[2] = v; },
        get l() { return _line128_reg8[6]; }, set l(v) { _line128_reg8[6] = v; },
        get h() { return _line128_reg8[7]; }, set h(v) { _line128_reg8[7] = v; },
        get hl() { return _line128_reg16[3]; }, set hl(v) { _line128_reg16[3] = v; },
        get sp() { return _line128_reg16[4]; }, set sp(v) { _line128_reg16[4] = v; },
        get pc() { return _line128_reg16[5]; }, set pc(v) { _line128_reg16[5] = v; }
    },

    rb: function(a) { return this.memory[a]; },
    wb: function(a,v) { this.memory[a] = v; },
    rw: function(a) { return this.rb(a)|(this.rb(a+1)<<8); },
    ww: function(a,v) { this.wb(a, v&0xFF); this.wb(a+1, v>>8); },

    init: function() { 
        this.r.af = 0x01B0; this.r.bc = 0x0013; this.r.de = 0x00D8; this.r.hl = 0x014D; 
        this.r.sp = 0xFFFE; this.r.pc = 0x0100;
        this.ime=0; this.halt=0; this._eiDelay=false;
        this.memory.fill(0);
        
        // Z80 Background processing routine to simulate OS execution hardware cycles
        this.memory[0x0100] = 0x3C; // INC A
        this.memory[0x0101] = 0x03; // INC BC
        this.memory[0x0102] = 0x13; // INC DE
        this.memory[0x0103] = 0x23; // INC HL
        this.memory[0x0104] = 0x18; // JR
        this.memory[0x0105] = 0xFA; // -6
    },

    step: function() {
        if (this._eiDelay) { this.ime = 1; this._eiDelay = false; }
        if(this.halt) { this.clock.t=4; if(this._ie&this._if)this.halt=0; else this.halt=0; return; }
        
        let op=this.rb(this.r.pc++); this.clock.t=4; let r=this.r; let t=0;
        
        const add=n=>{let a=r.a;let res=a+n;r.f=(res&255?0:128)|((a^n^res)&16?32:0)|(res>255?16:0);r.a=res&255;}
        const adc=n=>{let a=r.a;let c=(r.f&16)?1:0;let res=a+n+c;r.f=(res&255?0:128)|((a^n^res)&16?32:0)|(res>255?16:0);r.a=res&255;}
        const sub=n=>{let a=r.a;let res=a-n;r.f=(res===0?128:0)|64|(((a&0xF)<(n&0xF))?32:0)|(res<0?16:0);r.a=res&0xFF;}
        const sbc=n=>{let a=r.a;let c=(r.f&16)?1:0;let res=a-n-c;r.f=(res&0xFF?0:128)|64|(((a&0xF)-(n&0xF)-c)<0?32:0)|(res<0?16:0);r.a=res&0xFF;}
        const and=n=>{r.a&=n;r.f=(r.a?0:128)|32;}
        const or=n=>{r.a|=n;r.f=(r.a?0:128);}
        const xor=n=>{r.a^=n;r.f=(r.a?0:128);}
        const cp=n=>{let res=r.a-n;r.f=(res===0?128:0)|64|(((r.a&0xF)<(n&0xF))?32:0)|(res<0?16:0);}
        const inc=n=>{let res=(n+1)&255;r.f=(r.f&16)|(res?0:128)|((res&15)?0:32);return res;}
        const dec=n=>{let res=(n-1)&255;r.f=(r.f&16)|64|(res?0:128)|((res&15)==15?32:0);return res;}
        const add16=(v)=>{let hl=r.hl;let res=hl+v;r.f=(r.f&128)|((hl^v^(res&65535))&4096?32:0)|(res>65535?16:0);r.hl=res&0xFFFF;this.clock.t+=4;}

        switch(op){
            case 0x00:break;
            case 0x01:r.bc=this.rw(r.pc);r.pc+=2;this.clock.t+=8;break;
            case 0x02:this.wb(r.bc,r.a);this.clock.t+=4;break;case 0x03:r.bc=(r.bc+1)&65535;this.clock.t+=4;break;case 0x04:r.b=inc(r.b);break;case 0x05:r.b=dec(r.b);break;case 0x06:r.b=this.rb(r.pc++);this.clock.t+=4;break;case 0x07:{let c=r.a>>7;r.a=((r.a<<1)|c)&255;r.f=(r.f&0)|(c?16:0);break;}
            case 0x08:t=this.rw(r.pc);r.pc+=2;this.ww(t,r.sp);this.clock.t+=16;break;
            case 0x09:add16(r.bc);break;
            case 0x0A:r.a=this.rb(r.bc);this.clock.t+=4;break;case 0x0B:r.bc=(r.bc-1)&65535;this.clock.t+=4;break;case 0x0C:r.c=inc(r.c);break;case 0x0D:r.c=dec(r.c);break;case 0x0E:r.c=this.rb(r.pc++);this.clock.t+=4;break;case 0x0F:{let c=r.a&1;r.a=(r.a>>1)|(c<<7);r.f=(r.f&0)|(c?16:0);break;}
            case 0x10:if(this._key1){this._doubleSpeed=!this._doubleSpeed;this._key1=0;}else{this.halt=1;}r.pc++;break; 
            case 0x11:r.de=this.rw(r.pc);r.pc+=2;this.clock.t+=8;break;
            case 0x12:this.wb(r.de,r.a);this.clock.t+=4;break;case 0x13:r.de=(r.de+1)&65535;this.clock.t+=4;break;case 0x14:r.d=inc(r.d);break;case 0x15:r.d=dec(r.d);break;case 0x16:r.d=this.rb(r.pc++);this.clock.t+=4;break;case 0x17:{let c=r.a>>7;r.a=((r.a<<1)|((r.f&16)?1:0))&255;r.f=(r.f&0)|(c?16:0);break;}case 0x18:t=this.rb(r.pc++);if(t>127)t-=256;r.pc+=t;this.clock.t+=8;break;
            case 0x19:add16(r.de);break;
            case 0x1A:r.a=this.rb(r.de);this.clock.t+=4;break;case 0x1B:r.de=(r.de-1)&65535;this.clock.t+=4;break;case 0x1C:r.e=inc(r.e);break;case 0x1D:r.e=dec(r.e);break;case 0x1E:r.e=this.rb(r.pc++);this.clock.t+=4;break;case 0x1F:{let c=r.a&1;r.a=(r.a>>1)|((r.f&16)?128:0);r.f=(r.f&0)|(c?16:0);break;}
            case 0x20:t=this.rb(r.pc++);if(t>127)t-=256;if(!(r.f&128)){r.pc+=t;this.clock.t+=4;}break;
            case 0x21:r.hl=this.rw(r.pc);r.pc+=2;this.clock.t+=8;break;
            case 0x22:this.wb(r.hl,r.a);r.hl=(r.hl+1)&65535;this.clock.t+=4;break;case 0x23:r.hl=(r.hl+1)&65535;this.clock.t+=4;break;case 0x24:r.h=inc(r.h);break;case 0x25:r.h=dec(r.h);break;case 0x26:r.h=this.rb(r.pc++);this.clock.t+=4;break;
            case 0x27: { let a = r.a; if(!(r.f&64)) { if((r.f&32)||(a&0xF)>9) a+=0x06; if((r.f&16)||a>0x99) { a+=0x60; r.f|=16; } } else { if(r.f&32) a=(a-6)&0xFF; if(r.f&16) a=(a-0x60)&0xFF; } r.f &= ~(32|128); if((a&0xFF)===0) r.f|=128; r.a=a&0xFF; } break;
            case 0x28:t=this.rb(r.pc++);if(t>127)t-=256;if(r.f&128){r.pc+=t;this.clock.t+=4;}break;
            case 0x29:add16(r.hl);break;
            case 0x2A:r.a=this.rb(r.hl);r.hl=(r.hl+1)&65535;this.clock.t+=4;break;case 0x2B:r.hl=(r.hl-1)&65535;this.clock.t+=4;break;case 0x2C:r.l=inc(r.l);break;case 0x2D:r.l=dec(r.l);break;case 0x2E:r.l=this.rb(r.pc++);this.clock.t+=4;break;case 0x2F:r.a^=255;r.f|=96;break;
            case 0x30:t=this.rb(r.pc++);if(t>127)t-=256;if(!(r.f&16)){r.pc+=t;this.clock.t+=4;}break;
            case 0x31:r.sp=this.rw(r.pc);r.pc+=2;this.clock.t+=8;break;
            case 0x32:this.wb(r.hl,r.a);r.hl=(r.hl-1)&65535;this.clock.t+=4;break;case 0x33:r.sp=(r.sp+1)&65535;this.clock.t+=4;break;case 0x34:this.wb(r.hl,inc(this.rb(r.hl)));this.clock.t+=8;break;case 0x35:this.wb(r.hl,dec(this.rb(r.hl)));this.clock.t+=8;break;case 0x36:this.wb(r.hl,this.rb(r.pc++));this.clock.t+=8;break;case 0x37:r.f=(r.f&128)|16;break;case 0x38:t=this.rb(r.pc++);if(t>127)t-=256;if(r.f&16){r.pc+=t;this.clock.t+=4;}break;
            case 0x39:add16(r.sp);break;
            case 0x3A:r.a=this.rb(r.hl);r.hl=(r.hl-1)&65535;this.clock.t+=4;break;case 0x3B:r.sp=(r.sp-1)&65535;this.clock.t+=4;break;case 0x3C:r.a=inc(r.a);break;case 0x3D:r.a=dec(r.a);break;case 0x3E:r.a=this.rb(r.pc++);this.clock.t+=4;break;case 0x3F:r.f=(r.f&128)|((r.f&16)?0:16);break;
            case 0x76:this.halt=1;break;
            case 0x40:break;case 0x41:r.b=r.c;break;case 0x42:r.b=r.d;break;case 0x43:r.b=r.e;break;case 0x44:r.b=r.h;break;case 0x45:r.b=r.l;break;case 0x46:r.b=this.rb(r.hl);this.clock.t+=4;break;case 0x47:r.b=r.a;break;case 0x48:r.c=r.b;break;case 0x49:break;case 0x4A:r.c=r.d;break;case 0x4B:r.c=r.e;break;case 0x4C:r.c=r.h;break;case 0x4D:r.c=r.l;break;case 0x4E:r.c=this.rb(r.hl);this.clock.t+=4;break;case 0x4F:r.c=r.a;break;

    ditherRect: function(x, y, w, h, pattern) {
        this.checkLimit(); this.ctx.fillStyle = this.color;

            let draw = false;
            if (pattern === 0 && (i + j) % 2 === 0) draw = true; if (pattern === 1 && j % 2 === 0) draw = true; if (pattern === 2 && i % 2 === 0) draw = true;
            if (draw) this.ctx.fillRect(Math.floor(x+i), Math.floor(y+j), 1, 1);
        }

    },
    drawSprite: function(x, y, hexData, w, h, ignoreBlack = true, scale = 1) {

        for (let i = 2; i < pts.length; i += 2) this.ctx.lineTo(Math.floor(pts[i])+0.5, Math.floor(pts[i+1])+0.5);

    ditherPolygon: function(pts, pattern) {

        this.ctx.closePath(); this.ctx.clip();

        for(let i=2; i<pts.length; i+=2) {
            if(pts[i] < minX) minX = pts[i]; if(pts[i] > maxX) maxX = pts[i];
            if(pts[i+1] < minY) minY = pts[i+1]; if(pts[i+1] > maxY) maxY = pts[i+1];
        }

    },
    drawRetroVector: function(x, y, scale, rot, pts) {

        this.ctx.save(); this.ctx.translate(Math.floor(x), Math.floor(y)); this.ctx.rotate(rot);
        this.ctx.beginPath(); this.ctx.moveTo(Math.floor(pts[0]*scale)+0.5, Math.floor(pts[1]*scale)+0.5);

        this.ctx.stroke(); this.ctx.restore();
    },
    project3D: function(x, y, z, fov = 100, camZ = 0) {
        let dz = z - camZ; if (dz <= 0) return null; let scale = fov / dz;

    },
    drawLMV: function(frameStr, startX = 0, startY = 0, drawWidth = 128, ignoreBlack = false, scale = 1) {
        if (!frameStr) return; this.checkLimit();
        let parts = frameStr.split(','); let ptr = 0; const pW = this.width / 128; const pH = this.height / 96;

                if (!isTransp) this.rawRect((startX + x * scale) * pW, (startY + y * scale) * pH, drawLen * scale * pW, scale * pH);
                ptr += drawLen; count -= drawLen;
            }
        }
        this.ctx.fillStyle = this.color; 
    }
};

// --- GLOBALS: Progression Lock & Anti-Cheat APIs ---
window.progression_save_data = function(lockId, dataObj) {
    let dataStr = typeof dataObj === 'string' ? dataObj : JSON.stringify(dataObj);
    // Generate an 8-digit deterministic tamper-evident hash
    let h = 0;
    for(let i=0; i<dataStr.length; i++) {
        h = ((h << 5) - h) + dataStr.charCodeAt(i);
        h |= 0;
    }
    let hash8 = Math.abs(h).toString().padStart(8, '1').substring(0, 8);
    
    LINE_STORAGE.save("PROG_" + lockId, {
        data: dataObj,
        hash: hash8
    });
};

window.progression_lock = function(lockId) {
    let payload = LINE_STORAGE.load("PROG_" + lockId);
    if (!payload) return { locked: true, data: null };
    
    let dataStr = typeof payload.data === 'string' ? payload.data : JSON.stringify(payload.data);
    let h = 0;
    for(let i=0; i<dataStr.length; i++) {
        h = ((h << 5) - h) + dataStr.charCodeAt(i);
        h |= 0;
    }
    let expectedHash = Math.abs(h).toString().padStart(8, '1').substring(0, 8);
    
    if (payload.hash !== expectedHash) {
        // Anti-cheat triggered: append '9' to permanently brick the tampered save
        payload.hash = payload.hash + "9"; 
        LINE_STORAGE.save("PROG_" + lockId, payload);
        SYSTEM.panic("PROGRESSION LOCK: INVALID OR TAMPERED 8-DIGIT SAVE HASH.");
        return { locked: true, error: true };
    }
    return { locked: false, data: payload.data };
};

// --- GLOBALS: Line Language Pre-Processor ---
window.applyLineLanguage = function(content) {
    // Dynamically replace native JS keywords with Line Language variants upon loading
    if (content.includes('[ENGINE SOURCE CODE]')) {
        return content.replace(/\[ENGINE SOURCE CODE\]([\s\S]*?)\[\/ENGINE SOURCE CODE\]/gi, (match, innerCode) => {
            let converted = innerCode
                .replace(/\bconst\b/g, 'section')
                .replace(/\bFunction\b/g, 'collect')
                .replace(/\bfunction\b/g, 'collect')
                .replace(/\blet\b/g, 'allow');
            return '[ENGINE SOURCE CODE]' + converted + '[/ENGINE SOURCE CODE]';
        });
    }
    return content;
};

window.compileBASICtoCH81 = function(code) {
    let lines = code.split('\n').map(l => l.trim().toUpperCase()).filter(l => l.length > 0); let bytecode = []; let labels = {}; let unresolvedJumps = []; let offset = 0x0200; 
    const getReg = (v) => { if(v>='A' && v<='G') return v.charCodeAt(0) - 65; return 0; };
    const supportedCmds = ['CLS', 'UPDATE', 'HALT', 'LET', 'ADD', 'SUB', 'PSET', 'DRAW', 'GOTO', 'IF', 'RND', 'KEY', 'COL', 'RECT', 'LMV'];
    for(let line of lines) {
        let parts = line.split(/\s+/); let lineNum = parseInt(parts[0]);
        if (!isNaN(lineNum)) { labels[lineNum] = offset; parts.shift(); }
        if (parts.length === 0) continue;
        let cmd = parts[0]; if (!supportedCmds.includes(cmd)) throw new Error(`UNSUPPORTED KEYWORD: ${cmd}`);
        if (cmd === 'CLS') { bytecode.push(0xE1); offset += 1; } else if (cmd === 'UPDATE') { bytecode.push(0xE0); offset += 1; } else if (cmd === 'HALT') { bytecode.push(0xFF); offset += 1; } 
        else if (cmd === 'LET') { let reg = getReg(parts[1]); let val = parts[3]; if (val >= 'A' && val <= 'G') { bytecode.push(0x02, reg, getReg(val)); offset += 3; } else { bytecode.push(0x01, reg, parseInt(val)&0xFF); offset += 3; } } 
        else if (cmd === 'ADD') { let reg = getReg(parts[1].replace(',','')); let val = parts[2]; if (val >= 'A' && val <= 'G') { bytecode.push(0x10, reg, getReg(val)); offset += 3; } else { bytecode.push(0x11, reg, parseInt(val)&0xFF); offset += 3; } } 
        else if (cmd === 'SUB') { let reg = getReg(parts[1].replace(',','')); let reg2 = getReg(parts[2]); bytecode.push(0x12, reg, reg2); offset += 3; } 
        else if (cmd === 'PSET') { let rx = getReg(parts[1].replace(',','')); let ry = getReg(parts[2]); bytecode.push(0xE3, rx, ry); offset += 3; } 
        else if (cmd === 'DRAW') { let char = parts[1].replace(/["',]/g, ''); let rx = getReg(parts[2].replace(',','')); let ry = getReg(parts[3]); bytecode.push(0xE4, char.charCodeAt(0), rx, ry); offset += 4; } 
        else if (cmd === 'GOTO') { let target = parseInt(parts[1]); bytecode.push(0x20, 0x00, 0x00); unresolvedJumps.push({ idx: bytecode.length - 2, target: target }); offset += 3; } 
        else if (cmd === 'IF') { let reg = getReg(parts[1]); let val = parseInt(parts[3]); let target = parseInt(parts[5]); bytecode.push(0x30, reg, val&0xFF); offset += 3; bytecode.push(0x21, 0x00, 0x00); unresolvedJumps.push({ idx: bytecode.length - 2, target: target }); offset += 3; } 
        else if (cmd === 'RND') { let reg = getReg(parts[1].replace(',','')); let mask = parseInt(parts[2]); bytecode.push(0xC0, reg, mask&0xFF); offset += 3; } 
        else if (cmd === 'KEY') { let reg = getReg(parts[1]); bytecode.push(0x60, reg); offset += 2; }
        else if (cmd === 'COL') { let reg = getReg(parts[1]); bytecode.push(0xE2, reg); offset += 2; }
        else if (cmd === 'RECT') { let rx = getReg(parts[1].replace(',','')); let ry = getReg(parts[2].replace(',','')); let rw = getReg(parts[3].replace(',','')); let rh = getReg(parts[4]); bytecode.push(0xE5, rx, ry, rw, rh); offset += 5; }
        else if (cmd === 'LMV') { let p = parseInt(parts[1].replace(',','')); let rx = getReg(parts[2].replace(',','')); let ry = getReg(parts[3].replace(',','')); let rw = getReg(parts[4]); bytecode.push(0xE6, p, rx, ry, rw); offset += 5; }
    }
    for (let jmp of unresolvedJumps) { let addr = labels[jmp.target]; if (addr !== undefined) { bytecode[jmp.idx] = (addr >> 8) & 0xFF; bytecode[jmp.idx + 1] = addr & 0xFF; } }
    return bytecode.map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('');
};

function processRawAppBlock(blockStr) {
    let b = blockStr; if (!b.trim()) return null;
    let runMatch = b.match(/run\(\s*([a-zA-Z0-9_]+)\s*\)/);
    
    // Custom LMV Graphics Overwrite Command integration
    // Resolves and applies the most recent custom LMV package
    let lmvMatches = [...b.matchAll(/(?:lmv\.graphics\.custom\(\s*(\d*)\s*\)\s*)?\[LMV_PAYLOAD\]([\s\S]*?)\[\/LMV_PAYLOAD\]/gi)];
    if (lmvMatches.length > 0) {
        let bestMatch = lmvMatches[0];
        let maxNum = -1;
        for (let m of lmvMatches) {
            let numStr = m[1];
            let num = (numStr && numStr.trim() !== "") ? parseInt(numStr) : 0;
            if (num >= maxNum) {
                maxNum = num;
                bestMatch = m;
            }

function encodeLMT(str) {
    let out = [];

        let c = str.charAt(i);
        if (/[a-z]/.test(c)) out.push(c.charCodeAt(0) - 96); else if (/[A-Z]/.test(c)) out.push(c.charCodeAt(0) - 64 + 26); else if (/[0-9]/.test(c)) out.push('n' + c);

    } return out.join('-');
}

function decodeLMT(str) {
    let parts = str.split('-'); let res = "";
    for (let i = 0; i < parts.length; i++) {
        let p = parts[i]; if (!p) continue;
        if (p === 'SPC') res += ' '; else if (p === 'NLN') res += '\n'; else if (p === 'DSH') res += '-'; else if (p.startsWith('n')) res += p.substring(1); else if (p.startsWith('x')) res += String.fromCharCode(parseInt(p.substring(1), 16));

    } return res;
}

                break;

        }

        let renderCount = 0;
        let clickedIdx = -1;
        for(let i = APP_MAN.offset; i < INSTALLED_APPS.length && renderCount < displayLimit; i++) {
            if (logicalY >= itemY - 8 && logicalY <= itemY + 4) clickedIdx = i;
            itemY += 10; renderCount++;

        if (renderCount < displayLimit && APP_MAN.offset <= INSTALLED_APPS.length) {
            let idx = INSTALLED_APPS.length;
            if (idx >= APP_MAN.offset && renderCount < displayLimit) { 
                if (logicalY >= itemY - 8 && logicalY <= itemY + 4) clickedIdx = idx;
                itemY += 10; renderCount++;

            idx++;

                if (logicalY >= itemY - 8 && logicalY <= itemY + 4) clickedIdx = idx;
                itemY += 10; renderCount++; 
            }

        LGC.setColor(SYSTEM.colorMode ? "#FFF" : "#b4b4b4"); LGC.clear(); LGC.setColor(SYSTEM.colorMode ? "#000" : "#111"); LGC.setFont("10px monospace"); LGC.text(`KERNEL LOADING APP TO RAM...`, 2, 20);
        let chunkSize = Math.max(1, Math.floor(SYSTEM.bootLMT.length / 30)); SYSTEM.bootLineIdx += chunkSize;
        let displayStr = SYSTEM.bootLMT.slice(Math.max(0, SYSTEM.bootLineIdx - 15), SYSTEM.bootLineIdx).join(' '); LGC.text(displayStr.substring(0, 30), 2, 50); LGC.rect(10, 80, (SYSTEM.bootLineIdx / SYSTEM.bootLMT.length) * (LGC.width - 20), 4);
        if (SYSTEM.bootLineIdx >= SYSTEM.bootLMT.length) finalizeAppLaunch(SYSTEM.bootApp);
    }
    else if (SYSTEM.state === 'ACCESS_DENIED') {
        LGC.setColor(SYSTEM.colorMode ? "#FFF" : "#b4b4b4"); LGC.clear(); LGC.setColor(SYSTEM.colorMode ? "#000" : "#111"); LGC.setFont("bold 12px monospace"); LGC.text("PROGRAM DENIED", 15, 35); LGC.setFont("10px monospace");
        let msg = SYSTEM.panicMsg || "UNAUTHORIZED KERNEL CALL";
        if (LGC.measureText(msg).width > LGC.width - 10) { let words = msg.split(' '); let line = ''; let y = 55; for(let w of words) { if(LGC.measureText(line + w + ' ').width > LGC.width - 10) { LGC.text(line, 2, y); y+=10; line = w + ' '; } else { line += w + ' '; } } LGC.text(line, 2, y); } else { LGC.text(msg, 2, 55); }
        if (Math.floor(Date.now() / 500) % 2 === 0) LGC.text("PRESS ESC TO EXIT", 20, 80);
    }
    else if (SYSTEM.state === 'APP_INFO') {
        LGC.setColor(SYSTEM.colorMode ? "#FFF" : "#b4b4b4"); LGC.clear(); LGC.setColor(SYSTEM.colorMode ? "#000" : "#111"); LGC.setFont("bold 12px monospace"); LGC.text(`[ ${APP_INFO_DISPLAY.label.toUpperCase()} ]`, 2, 14); LGC.setFont("bold 10px monospace"); LGC.text(`TITLE: ${APP_INFO_DISPLAY.title}`, 2, 30);
        if (!APP_INFO_DISPLAY.lines) {
            APP_INFO_DISPLAY.lines = []; let words = APP_INFO_DISPLAY.desc.split(' '); let line = ''; LGC.setFont("10px monospace");
            for(let w of words) { if(LGC.measureText(line + w + ' ').width > LGC.width - 10) { if (line.trim() === '') { APP_INFO_DISPLAY.lines.push(w); } else { APP_INFO_DISPLAY.lines.push(line); line = w + ' '; } } else { line += w + ' '; } }
            if (line.trim() !== '') APP_INFO_DISPLAY.lines.push(line); APP_INFO_DISPLAY.scrollY = 0; APP_INFO_DISPLAY.scrollDelay = 0;
        }
        LGC.setFont("10px monospace"); let y = 50; let limit = Math.floor((LGC.height - 55) / 12);
        for (let i = APP_INFO_DISPLAY.scrollY; i < Math.min(APP_INFO_DISPLAY.lines.length, APP_INFO_DISPLAY.scrollY + limit); i++) { LGC.text(APP_INFO_DISPLAY.lines[i], 2, y); y += 12; }
        if (inputs.up || inputs.w) { if (APP_INFO_DISPLAY.scrollDelay <= 0) { APP_INFO_DISPLAY.scrollY = Math.max(0, APP_INFO_DISPLAY.scrollY - 1); APP_INFO_DISPLAY.scrollDelay = 5; } else APP_INFO_DISPLAY.scrollDelay--; } else if (inputs.down || inputs.s) { if (APP_INFO_DISPLAY.scrollDelay <= 0) { APP_INFO_DISPLAY.scrollY = Math.min(Math.max(0, APP_INFO_DISPLAY.lines.length - limit), APP_INFO_DISPLAY.scrollY + 1); APP_INFO_DISPLAY.scrollDelay = 5; } else APP_INFO_DISPLAY.scrollDelay--; } else { APP_INFO_DISPLAY.scrollDelay = 0; }
        if (APP_INFO_DISPLAY.scrollY > 0) LGC.text("^", LGC.width - 10, 45); if (APP_INFO_DISPLAY.scrollY < Math.max(0, APP_INFO_DISPLAY.lines.length - limit)) LGC.text("v", LGC.width - 10, LGC.height - 5);
    } 
    else if (SYSTEM.state === 'OS') {
        const items = MENUS[currentMenu];
        if (inputs.c && !prevInputs.c && (currentMenu === 'GAMES' || currentMenu === 'MEDIA') && items[SYSTEM.menuIdx] && items[SYSTEM.menuIdx].appData) { APP_INFO_DISPLAY = items[SYSTEM.menuIdx].appData; APP_INFO_DISPLAY.lines = null; SYSTEM.state = 'APP_INFO'; uiLayer.style.display = 'none'; } else {
            if ((inputs.up || inputs.w) && !(prevInputs.up || prevInputs.w)) { SYSTEM.menuIdx = (SYSTEM.menuIdx - 1 + items.length) % items.length; renderMenu(); }
            if ((inputs.down || inputs.s) && !(prevInputs.down || prevInputs.s)) { SYSTEM.menuIdx = (SYSTEM.menuIdx + 1) % items.length; renderMenu(); }
            
            let actionPressed = (inputs.a && !prevInputs.a) || (inputs.b && !prevInputs.b) || (inputs.y && !prevInputs.y) || (inputs.c && !prevInputs.c);
            if (actionPressed) items[SYSTEM.menuIdx].action();
            
            if (inputs.back && !prevInputs.back && currentMenu !== 'MAIN') loadMenu('MAIN');
        } updateZ80Regs();
    }
    
    if (SYSTEM.state === 'CALC') renderCalculator(); if (SYSTEM.state === 'TERMINAL') renderTerminal(); if (SYSTEM.state === 'INSTALLER') { updateNativeInstaller(); renderNativeInstaller(); } if (SYSTEM.state === 'APP_MANAGER') { updateAppManager(); renderAppManager(); }
    
    if (SYSTEM.state === 'MEDIA_PROMPT') {
        LGC.setColor(SYSTEM.colorMode ? "#FFF" : "#b4b4b4"); LGC.clear(); LGC.setColor(SYSTEM.colorMode ? "#000" : "#111"); LGC.setFont("bold 10px monospace"); LGC.text("MEDIA PROCESSOR", 2, 10); LGC.line(0, 12, LGC.width, 12); LGC.setFont("10px monospace"); LGC.text(`FILE: ${MEDIA_PROMPT_STATE.title}.${MEDIA_PROMPT_STATE.ext}`, 5, 25);
        for (let i = 0; i < MEDIA_PROMPT_STATE.options.length; i++) { LGC.text((i === MEDIA_PROMPT_STATE.cursor ? "> " : "  ") + MEDIA_PROMPT_STATE.options[i], 5, 45 + i*10); }
        if ((inputs.up || inputs.w) && !(prevInputs.up || prevInputs.w)) MEDIA_PROMPT_STATE.cursor = Math.max(0, MEDIA_PROMPT_STATE.cursor - 1); 
        if ((inputs.down || inputs.s) && !(prevInputs.down || prevInputs.s)) MEDIA_PROMPT_STATE.cursor = Math.min(MEDIA_PROMPT_STATE.options.length - 1, MEDIA_PROMPT_STATE.cursor + 1);
        
        let actionPressed = (inputs.a && !prevInputs.a) || (inputs.b && !prevInputs.b) || (inputs.y && !prevInputs.y) || (inputs.c && !prevInputs.c);
        if (actionPressed) {
            executeMediaPromptAction();
        }
    }

    if (SYSTEM.state === 'LMF_INDEX') {
        if (inputs.up || inputs.w) LMF_INDEX.scrollY = Math.max(0, LMF_INDEX.scrollY - 1); 
        if (inputs.down || inputs.s) LMF_INDEX.scrollY = Math.min(Math.max(0, LMF_INDEX.lines.length - 5), LMF_INDEX.scrollY + 1);
        if (inputs.left || inputs.a_key) LMF_INDEX.scrollX = Math.max(0, LMF_INDEX.scrollX - 5); 
        if (inputs.right || inputs.d) LMF_INDEX.scrollX += 5;
        if (inputs.c && !prevInputs.c) { LMF_INDEX.wrap = !LMF_INDEX.wrap; LMF_INDEX.scrollX = 0; updateLMFIndexLines(); } renderLMFIndex();
    }
    
    if (SYSTEM.state === 'CUSTOM_APP') renderCustomApp();

    if (SYSTEM.state === 'MEDIA_MAKER') {
        LGC.setColor(SYSTEM.colorMode ? "#FFF" : "#b4b4b4"); LGC.clear(); LGC.setColor(SYSTEM.colorMode ? "#000" : "#111"); LGC.setFont("bold 12px monospace"); LGC.text("MEDIA MAKER", 10, 20); LGC.setFont("10px monospace"); LGC.text("CONVERTS MEDIA TO 8-BIT", 5, 35);
        if (Math.floor(Date.now() / 500) % 2 === 0) LGC.text("PRESS FACE BTN TO UPLOAD", 15, 60);
        let actionPressed = (inputs.a && !prevInputs.a) || (inputs.b && !prevInputs.b) || (inputs.y && !prevInputs.y) || (inputs.c && !prevInputs.c);
        if (actionPressed) { document.getElementById('media-loader').click(); }
    }
    else if (SYSTEM.state === 'MEDIA_PROCESSING') {
        if (!MEDIA_MAKER_STATE.capturing) { videoElement.play(); MEDIA_MAKER_STATE.capturing = true; MEDIA_MAKER_STATE.frames = []; MEDIA_MAKER_STATE.lastTime = timestamp; MEDIA_MAKER_STATE.frameCount = 0; }
        if (timestamp - MEDIA_MAKER_STATE.lastTime > 100) {
            MEDIA_MAKER_STATE.lastTime = timestamp;
            if (videoElement.ended || MEDIA_MAKER_STATE.frameCount > 300) { 
                videoElement.pause(); MEDIA_MAKER_STATE.capturing = false; MEDIA_MAKER_STATE.resultPayload = MEDIA_MAKER_STATE.frames.join('|');
                let virtualLMF = `${MEDIA_MAKER_STATE.appName || 'CUSTOM_VIDEO'} (title)(VIDEO)\nSYS_CALL:0x88A1\ndescription(Line Media Video Payload)\nrun(ROM_LMV)\n[LMV_PAYLOAD]\n${MEDIA_MAKER_STATE.resultPayload}\n[/LMV_PAYLOAD]\n========`;
                launchMediaPrompt(MEDIA_MAKER_STATE.appName || 'CUSTOM_VIDEO', 'lmv', virtualLMF);
            } else {
                offCtx.drawImage(videoElement, 0, 0, 128, 96); let imgData = offCtx.getImageData(0, 0, 128, 96).data; let lastColor = null; let count = 0; let frameStr = ""; const pW = LGC.width/128; const pH = LGC.height/96; LGC.clear(); let ptr = 0;
                for(let i=0; i<imgData.length; i+=4) {
                    let r = imgData[i]; let g = imgData[i+1]; let b = imgData[i+2]; let minDist = Infinity; let cIdx = 0;
                    for(let j=0; j<16; j++) { let p = LMV_PALETTE[j]; let dist = Math.pow(r-p[0],2) + Math.pow(g-p[1],2) + Math.pow(b-p[2],2); if(dist < minDist) { minDist = dist; cIdx = j; } }
                    let cHex = cIdx.toString(16).toUpperCase(); LGC.ctx.fillStyle = LMV_COLORS_HEX[cIdx]; let dx = ptr % 128; let dy = Math.floor(ptr / 128); LGC.rawRect(dx*pW, dy*pH, pW, pH); ptr++;
                    if(cHex === lastColor) count++; else { if(lastColor !== null) frameStr += lastColor + count.toString(16) + ","; lastColor = cHex; count = 1; }
                }
                if(count > 0) frameStr += lastColor + count.toString(16) + ","; MEDIA_MAKER_STATE.frames.push(frameStr); MEDIA_MAKER_STATE.frameCount++;
            }
        }
    }
    else if (SYSTEM.state === 'MEDIA_DONE') {
        let typeTag = MEDIA_MAKER_STATE.isVideo ? 'LMV' : 'LMP';
        let virtualLMF = `${MEDIA_MAKER_STATE.appName || 'CUSTOM_MEDIA'} (title)(MEDIA)\nSYS_CALL:0x88A1\ndescription(Line Media Payload)\nrun(ROM_${typeTag})\n[${typeTag}_PAYLOAD]\n${MEDIA_MAKER_STATE.resultPayload}\n[/${typeTag}_PAYLOAD]\n========`;
        launchMediaPrompt(MEDIA_MAKER_STATE.appName || 'CUSTOM_MEDIA', typeTag.toLowerCase(), virtualLMF);
    }

    if (SYSTEM.state === 'APP' && SYSTEM.activeApp) {
        accumulator += deltaTime; if (accumulator > 200) accumulator = 200;
        while (accumulator >= 1000/60) { SYSTEM.activeApp.update(); accumulator -= 1000/60; } 
        try { SYSTEM.activeApp.render(); } catch (e) { if (e !== "LGC_LIMIT_EXCEEDED") console.error(e); }
        updateZ80Regs(); 
    }

    if (SYSTEM.notifTimer > 0) { LGC.setColor("rgba(0,0,0,0.8)"); LGC.rect(5, 5, LGC.width - 10, 15); LGC.setColor("#0f0"); LGC.setFont("bold 8px monospace"); LGC.text(SYSTEM.notification, 10, 15); SYSTEM.notifTimer--; }

    Object.keys(inputs).forEach(k => prevInputs[k] = inputs[k]); requestAnimationFrame(mainLoop);
}

boot();

</script>
