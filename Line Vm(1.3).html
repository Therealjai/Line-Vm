<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Line Vm - V1.3</title>
	<style>
		:root {
			/* Classic Black & Grey aesthetic for standard Line OS games */
			--case-color: #1a1a1c;
			--screen-bg: #b4b4b4; 
			--screen-pixel: #111111;
		}

		body {
			background-color: #050505;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
			font-family: 'Courier New', Courier, monospace;
			color: #eee;
			overflow: hidden;
			user-select: none;
			touch-action: none;
		}

		/* --- HARDWARE --- */
		#line-player-case {
			background-color: var(--case-color);
			padding: 25px;
			border-radius: 10px;
			box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 15px 35px rgba(0,0,0,0.8);
			display: flex;
			flex-direction: column;
			align-items: center;
			border: 2px solid #111;
			position: relative;
			transition: all 0.3s ease;
		}

		.brand-logo {
			color: #aaa;
			font-weight: bold;
			letter-spacing: 2px;
			font-size: 14px;
			margin-bottom: 2px;
			text-transform: uppercase;
			font-family: sans-serif;
			text-shadow: 0 1px 0 rgba(255,255,255,0.1);
		}

		.hardware-spec {
			color: #666;
			font-size: 9px;
			margin-bottom: 10px;
			letter-spacing: 1px;
			font-family: 'Courier New', monospace;
		}

		#screen-bezel {
			background-color: #222;
			padding: 15px 20px;
			border-radius: 5px 5px 20px 5px;
			box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
			margin-bottom: 15px;
			transition: all 0.3s ease;
			position: relative;
		}

		/* The Screen */
		#screen-viewport {
			width: 480px;
			height: 320px;
			background-color: #000;
			border: 3px solid #111;
			position: relative;
			overflow: hidden;
			box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4);
			transition: width 0.3s, height 0.3s;
			transform: translateZ(0); /* Force GPU Hardware Acceleration */
		}

		canvas {
			width: 100%;
			height: 100%;
			display: block;
			image-rendering: -moz-crisp-edges;
			image-rendering: -webkit-optimize-contrast;
			image-rendering: crisp-edges;
			image-rendering: pixelated;
			position: absolute;
			top: 0; left: 0;
			z-index: 10;
		}

		.scanlines {
			position: absolute;
			top: 0; left: 0; width: 100%; height: 100%;
			background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
			pointer-events: none;
			z-index: 100;
			opacity: 1;
			transition: opacity 0.3s;
		}
		.scanlines.hidden { opacity: 0; }

		/* --- CONTROLS --- */
		.controls-area { width: 100%; padding: 0 10px; box-sizing: border-box; }
		.controls-hint { font-size: 10px; text-align: center; opacity: 0.5; margin-top: 5px; }
		.key {
			display: inline-block;
			background: #333;
			border-bottom: 2px solid #111;
			border-radius: 4px;
			padding: 4px 8px;
			margin: 2px;
			font-weight: bold;
			color: white;
			font-size: 10px;
		}

		/* --- UI OVERLAYS --- */
		#ui-layer {
			position: absolute;
			top: 0; left: 0; width: 100%; height: 100%;
			display: flex;
			flex-direction: column;
			padding: 10px;
			box-sizing: border-box;
			font-family: 'Courier New', monospace;
			font-weight: bold;
			color: var(--screen-pixel);
			z-index: 60;
			background-color: var(--screen-bg);
		}

		#menu-list li { padding: 5px; cursor: pointer; border: 1px solid transparent; }
		#menu-list li:hover { background-color: rgba(0,0,0,0.05); }

		/* Modal for Input */
		#modal-overlay {
			position: absolute;
			top: 0; left: 0; width: 100%; height: 100%;
			background: rgba(0,0,0,0.9);
			z-index: 200;
			display: none;
			align-items: center;
			justify-content: center;
			flex-direction: column;
		}
		textarea {
			width: 90%; height: 50%;
			background: #222; color: #bbb;
			border: 1px solid #444;
			font-family: monospace;
			font-size: 10px;
			padding: 5px;
			resize: none;
		}
		.modal-buttons { display:flex; gap:10px; margin-top:10px; }
		.modal-btn {
			padding: 8px 15px;
			background: #444; color: white; border: none; cursor: pointer;
			font-family: 'Courier New', monospace; font-weight: bold; font-size: 10px;
		}
		.modal-btn:hover { background: #555; }
		
		/* --- FULLSCREEN MODE --- */
		body.fullscreen-active { background-color: #000; }
		body.fullscreen-active #line-player-case {
			width: 100vw; height: 100vh; padding: 0; border: none; border-radius: 0; box-shadow: none; background: #000;
		}
		body.fullscreen-active .brand-logo, 
		body.fullscreen-active .hardware-spec, 
		body.fullscreen-active .controls-area { display: none; }
		
		body.fullscreen-active #screen-bezel {
			width: 100%; height: 100%; padding: 0; margin: 0; border-radius: 0; box-shadow: none; background: #000; display: flex; align-items: center; justify-content: center;
		}
		
		body.fullscreen-active #screen-viewport {
			width: 100vw !important;
			height: 100vh !important;
			max-width: calc(100vh * 1.33333) !important;
			max-height: calc(100vw * 0.75) !important;
			border: none;
			box-shadow: none;
		}
		
		body.fullscreen-active #ui-layer {
			font-size: max(2vh, 12px) !important;
		}

		/* --- SCREEN ONLY MODE --- */
		body.screen-only-active #line-player-case {
			background: transparent; padding: 0; border: none; box-shadow: none;
		}
		body.screen-only-active .brand-logo,
		body.screen-only-active .hardware-spec,
		body.screen-only-active .controls-area { display: none; }
		body.screen-only-active #screen-bezel {
			background: transparent; padding: 0; box-shadow: none; margin: 0; border-radius: 0;
		}
		body.screen-only-active #screen-viewport {
			border: none;
			box-shadow: none;
		}
	</style>
</head>
<body>

	<div id="line-player-case">
		<div class="brand-logo">Line Vm</div>
		<div class="hardware-spec" id="hardware-display">Z80 CHIP (8-BIT) | 64KB RAM | LGC GPU | VIRTUAL KERNEL</div>
		
		<div id="screen-bezel">
			<div id="screen-viewport">
				<canvas id="gameCanvas" width="128" height="96"></canvas>
				<div class="scanlines" id="scanlines"></div>
				
				<div id="ui-layer">
					<div id="z80-registers" style="font-size: 8px; color: rgba(17, 17, 17, 0.8); border-bottom: 1px dashed currentColor; padding-bottom: 2px; margin-bottom: 4px; display: flex; justify-content: space-between;">
						<span id="reg-af">AF:0000</span>
						<span id="reg-bc">BC:0000</span>
						<span id="reg-de">DE:0000</span>
						<span id="reg-hl">HL:0000</span>
						<span id="reg-pc">PC:0100</span>
					</div>

					<div style="border-bottom: 2px solid currentColor; margin-bottom: 5px; display:flex; justify-content:space-between;">
						<span>Line Vm V1.3</span>
						<span id="clock">12:00</span>
					</div>
					<ul id="menu-list" style="list-style:none; padding:0; flex-grow:1; overflow-y:auto; margin:0;">
					</ul>
					<div style="font-size:0.8em; opacity:0.8; border-top:1px solid currentColor; padding-top:2px;">
						NAV: D-PAD | SEL: Z | OPT: C | BACK: ESC
					</div>
				</div>
			</div>
		</div>

		<div class="controls-area">
			<div class="controls-hint">
				<span class="key"><span class="t-btn" data-key="up">↑</span><span class="t-btn" data-key="down">↓</span><span class="t-btn" data-key="left">←</span><span class="t-btn" data-key="right">→</span></span> D-PAD &nbsp;
				<span class="key"><span class="t-btn" data-key="w">W</span><span class="t-btn" data-key="a_key">A</span><span class="t-btn" data-key="s">S</span><span class="t-btn" data-key="d">D</span></span> MOVE &nbsp;
				<span class="key t-btn" data-key="space">SPACE</span> JUMP &nbsp;
				<span class="key t-btn" data-key="a">Z</span> A &nbsp;
				<span class="key t-btn" data-key="b">X</span> B &nbsp;
				<span class="key t-btn" data-key="y">Y</span> Y &nbsp;
				<span class="key t-btn" data-key="c">C</span> OPT &nbsp;
				<span class="key t-btn" data-key="back">ESC</span> BACK
			</div>
			<div style="text-align:center; font-size:9px; color:#666; margin-top:5px;">
			Use 'PRG: CTRL REMAPPER' to set custom buttons
		</div>
	</div>
	
	<input type="file" id="file-loader" style="display:none;" accept=".txt,.lmf,.lmt,.ch8,.ch81,.bas,.lmv,.lmp">
	<input type="file" id="ls-loader" style="display:none;" accept=".ls">
	<input type="file" id="media-loader" style="display:none;" accept="video/mp4,video/webm,image/png,image/jpeg,image/gif">
		<video id="hidden-video" style="display:none;" muted playsinline></video>
		<img id="hidden-image" style="display:none;">
		<canvas id="hidden-canvas" width="128" height="96" style="display:none;"></canvas>
	</div>

	<div id="modal-overlay">
		<div id="modal-title" style="color:white; font-family:sans-serif; margin-bottom:10px; font-weight:bold;"></div>
		<textarea id="modal-input" placeholder="..."></textarea>
		<div class="modal-buttons">
			<button class="modal-btn" id="modal-action-btn-1">ACTION 1</button>
			<button class="modal-btn" id="modal-action-btn-2" style="display:none;">ACTION 2</button>
			<button class="modal-btn" onclick="closeModal()">CLOSE</button>
		</div>
		<div id="modal-status" style="color:#0f0; font-family:monospace; margin-top:10px; line-height:1.2; text-align:center;"></div>
	</div>

<script>
const canvas = document.getElementById('gameCanvas');
const uiLayer = document.getElementById('ui-layer');
const menuList = document.getElementById('menu-list');
const videoElement = document.getElementById('hidden-video');
const imageElement = document.getElementById('hidden-image');
const offscreenCanvas = document.getElementById('hidden-canvas');
const offCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

// --- DEFAULT OS KEYMAPPINGS (DYNAMIC CONTROLS) ---
let KEY_MAPPINGS = JSON.parse(localStorage.getItem('LINE_OS_KEYMAP')) || {
	up: ['ArrowUp'], down: ['ArrowDown'], left: ['ArrowLeft'], right: ['ArrowRight'],
	w: ['w','W'], s: ['s','S'], a_key: ['a','A'], d: ['d','D'],
	space: [' '], a: ['z','Z','Enter'], b: ['x','X'], y: ['y','Y'], c: ['c','C','Shift'], back: ['Escape']
};

// --- LINEPAD 8-BIT AUDIO SYSTEM ---
const LINEPAD = {
	ctx: null,
	init: function() {
		if (!this.ctx) {
			const AudioContext = window.AudioContext || window.webkitAudioContext;
			this.ctx = new AudioContext();
		}
	},
	unlock: function() {
		if (this.ctx && this.ctx.state === 'suspended') {
			this.ctx.resume();
		} else if (!this.ctx) {
			this.init();
		}
	},
	play: function(type, freq, duration, vol=0.5, endFreq=null) {
		this.unlock();
		if (!this.ctx || this.ctx.state === 'suspended') return;
		if (endFreq === null) endFreq = freq;

		const osc = this.ctx.createOscillator();
		const gain = this.ctx.createGain();
		osc.connect(gain);
		gain.connect(this.ctx.destination);

		const t = this.ctx.currentTime;
		const durS = duration / 1000;

		if (type === 3) {
			const bufferSize = this.ctx.sampleRate * durS;
			const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
			const data = buffer.getChannelData(0);
			let lastVal = 0;
			for (let i = 0; i < bufferSize; i++) {
				if (i % Math.max(1, Math.floor(freq / 50)) === 0) lastVal = Math.random() * 2 - 1;
				data[i] = lastVal;
			}
			const noiseSrc = this.ctx.createBufferSource();
			noiseSrc.buffer = buffer;
			noiseSrc.connect(gain);
			noiseSrc.start(t);
			
			gain.gain.setValueAtTime(vol, t);
			gain.gain.exponentialRampToValueAtTime(0.01, t + durS);
			noiseSrc.stop(t + durS);
			return;
		}

		const types = ['square', 'sawtooth', 'triangle'];
		osc.type = types[type] || 'square';
		
		osc.frequency.setValueAtTime(freq, t);
		if (freq !== endFreq) {
			osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + durS);
		}
		
		gain.gain.setValueAtTime(vol, t);
		gain.gain.setTargetAtTime(0.001, t + durS, durS / 4);

		osc.start(t);
		osc.stop(t + durS);
	}
};

// --- LINE128 Z80 HARDWARE CHIP ---
const _line128_regBuf = new ArrayBuffer(12);
const _line128_reg8 = new Uint8Array(_line128_regBuf);
const _line128_reg16 = new Uint16Array(_line128_regBuf);

const LINE128_MEMORY = {
	clock:{t:0}, ime:0, halt:0, _eiDelay: false,
	memory: new Uint8Array(65536), 
	_ie:0, _if:0, _doubleSpeed:false, _key1:0,

	r: {
		get f() { return _line128_reg8[0]; }, set f(v) { _line128_reg8[0] = v & 0xF0; },
		get a() { return _line128_reg8[1]; }, set a(v) { _line128_reg8[1] = v; },
		get af() { return _line128_reg16[0]; }, set af(v) { _line128_reg16[0] = v & 0xFFF0; },
		get c() { return _line128_reg8[2]; }, set c(v) { _line128_reg8[2] = v; },
		get b() { return _line128_reg8[3]; }, set b(v) { _line128_reg8[3] = v; },
		get bc() { return _line128_reg16[1]; }, set bc(v) { _line128_reg16[1] = v; },
		get e() { return _line128_reg8[4]; }, set e(v) { _line128_reg8[4] = v; },
		get d() { return _line128_reg8[5]; }, set d(v) { _line128_reg8[5] = v; },
		get de() { return _line128_reg16[2]; }, set de(v) { _line128_reg16[2] = v; },
		get l() { return _line128_reg8[6]; }, set l(v) { _line128_reg8[6] = v; },
		get h() { return _line128_reg8[7]; }, set h(v) { _line128_reg8[7] = v; },
		get hl() { return _line128_reg16[3]; }, set hl(v) { _line128_reg16[3] = v; },
		get sp() { return _line128_reg16[4]; }, set sp(v) { _line128_reg16[4] = v; },
		get pc() { return _line128_reg16[5]; }, set pc(v) { _line128_reg16[5] = v; }
	},

	rb: function(a) { return this.memory[a]; },
	wb: function(a,v) { this.memory[a] = v; },
	rw: function(a) { return this.rb(a)|(this.rb(a+1)<<8); },
	ww: function(a,v) { this.wb(a, v&0xFF); this.wb(a+1, v>>8); },

	init: function() { 
		this.r.af = 0x01B0; this.r.bc = 0x0013; this.r.de = 0x00D8; this.r.hl = 0x014D; 
		this.r.sp = 0xFFFE; this.r.pc = 0x0100;
		this.ime=0; this.halt=0; this._eiDelay=false;
		this.memory.fill(0);
		
		this.memory[0x0100] = 0x3C; this.memory[0x0101] = 0x03; this.memory[0x0102] = 0x13; 
		this.memory[0x0103] = 0x23; this.memory[0x0104] = 0x18; this.memory[0x0105] = 0xFA; 
	},

	step: function() {
		if (this._eiDelay) { this.ime = 1; this._eiDelay = false; }
		if(this.halt) { this.clock.t=4; if(this._ie&this._if)this.halt=0; else this.halt=0; return; }
		
		let op=this.rb(this.r.pc++); this.clock.t=4; let r=this.r; let t=0;
		
		const add=n=>{let a=r.a;let res=a+n;r.f=(res&255?0:128)|((a^n^res)&16?32:0)|(res>255?16:0);r.a=res&255;}
		const adc=n=>{let a=r.a;let c=(r.f&16)?1:0;let res=a+n+c;r.f=(res&255?0:128)|((a^n^res)&16?32:0)|(res>255?16:0);r.a=res&255;}
		const sub=n=>{let a=r.a;let res=a-n;r.f=(res===0?128:0)|64|(((a&0xF)<(n&0xF))?32:0)|(res<0?16:0);r.a=res&0xFF;}
		const sbc=n=>{let a=r.a;let c=(r.f&16)?1:0;let res=a-n-c;r.f=(res&0xFF?0:128)|64|(((a&0xF)-(n&0xF)-c)<0?32:0)|(res<0?16:0);r.a=res&0xFF;}
		const and=n=>{r.a&=n;r.f=(r.a?0:128)|32;}
		const or=n=>{r.a|=n;r.f=(r.a?0:128);}
		const xor=n=>{r.a^=n;r.f=(r.a?0:128);}
		const cp=n=>{let res=r.a-n;r.f=(res===0?128:0)|64|(((r.a&0xF)<(n&0xF))?32:0)|(res<0?16:0);}
		const inc=n=>{let res=(n+1)&255;r.f=(r.f&16)|(res?0:128)|((res&15)?0:32);return res;}
		const dec=n=>{let res=(n-1)&255;r.f=(r.f&16)|64|(res?0:128)|((res&15)==15?32:0);return res;}
		const add16=(v)=>{let hl=r.hl;let res=hl+v;r.f=(r.f&128)|((hl^v^(res&65535))&4096?32:0)|(res>65535?16:0);r.hl=res&0xFFFF;this.clock.t+=4;}

		switch(op){
			case 0x00:break;
			case 0x01:r.bc=this.rw(r.pc);r.pc+=2;this.clock.t+=8;break;
			case 0x02:this.wb(r.bc,r.a);this.clock.t+=4;break;case 0x03:r.bc=(r.bc+1)&65535;this.clock.t+=4;break;case 0x04:r.b=inc(r.b);break;case 0x05:r.b=dec(r.b);break;case 0x06:r.b=this.rb(r.pc++);this.clock.t+=4;break;case 0x07:{let c=r.a>>7;r.a=((r.a<<1)|c)&255;r.f=(r.f&0)|(c?16:0);break;}
			case 0x08:t=this.rw(r.pc);r.pc+=2;this.ww(t,r.sp);this.clock.t+=16;break;
			case 0x09:add16(r.bc);break;
			case 0x0A:r.a=this.rb(r.bc);this.clock.t+=4;break;case 0x0B:r.bc=(r.bc-1)&65535;this.clock.t+=4;break;case 0x0C:r.c=inc(r.c);break;case 0x0D:r.c=dec(r.c);break;case 0x0E:r.c=this.rb(r.pc++);this.clock.t+=4;break;case 0x0F:{let c=r.a&1;r.a=(r.a>>1)|(c<<7);r.f=(r.f&0)|(c?16:0);break;}
			case 0x10:if(this._key1){this._doubleSpeed=!this._doubleSpeed;this._key1=0;}else{this.halt=1;}r.pc++;break; 
			case 0x11:r.de=this.rw(r.pc);r.pc+=2;this.clock.t+=8;break;
			case 0x12:this.wb(r.de,r.a);this.clock.t+=4;break;case 0x13:r.de=(r.de+1)&65535;this.clock.t+=4;break;case 0x14:r.d=inc(r.d);break;case 0x15:r.d=dec(r.d);break;case 0x16:r.d=this.rb(r.pc++);this.clock.t+=4;break;case 0x17:{let c=r.a>>7;r.a=((r.a<<1)|((r.f&16)?1:0))&255;r.f=(r.f&0)|(c?16:0);break;}case 0x18:t=this.rb(r.pc++);if(t>127)t-=256;r.pc+=t;this.clock.t+=8;break;
			case 0x19:add16(r.de);break;
			case 0x1A:r.a=this.rb(r.de);this.clock.t+=4;break;case 0x1B:r.de=(r.de-1)&65535;this.clock.t+=4;break;case 0x1C:r.e=inc(r.e);break;case 0x1D:r.e=dec(r.e);break;case 0x1E:r.e=this.rb(r.pc++);this.clock.t+=4;break;case 0x1F:{let c=r.a&1;r.a=(r.a>>1)|((r.f&16)?128:0);r.f=(r.f&0)|(c?16:0);break;}
			case 0x20:t=this.rb(r.pc++);if(t>127)t-=256;if(!(r.f&128)){r.pc+=t;this.clock.t+=4;}break;
			case 0x21:r.hl=this.rw(r.pc);r.pc+=2;this.clock.t+=8;break;
			case 0x22:this.wb(r.hl,r.a);r.hl=(r.hl+1)&65535;this.clock.t+=4;break;case 0x23:r.hl=(r.hl+1)&65535;this.clock.t+=4;break;case 0x24:r.h=inc(r.h);break;case 0x25:r.h=dec(r.h);break;case 0x26:r.h=this.rb(r.pc++);this.clock.t+=4;break;
			case 0x27: { let a = r.a; if(!(r.f&64)) { if((r.f&32)||(a&0xF)>9) a+=0x06; if((r.f&16)||a>0x99) { a+=0x60; r.f|=16; } } else { if(r.f&32) a=(a-6)&0xFF; if(r.f&16) a=(a-0x60)&0xFF; } r.f &= ~(32|128); if((a&0xFF)===0) r.f|=128; r.a=a&0xFF; } break;

function launch8Chipi() { SYSTEM.notification = "8CHIPI KERNEL ACTIVE"; SYSTEM.notifTimer = 180; }
function launchCH81() { SYSTEM.notification = "CH81 KERNEL ACTIVE"; SYSTEM.notifTimer = 180; }
function updateCH81() { 
	if(TRUE_KERNEL_CH81.state === 'WAIT_FRAME') TRUE_KERNEL_CH81.state = 'RUNNING';
	let cycles = 0;
	let maxCycles = TRUE_KERNEL_CH81.ch8Mode ? 15 : 1000;
	while(TRUE_KERNEL_CH81.state === 'RUNNING' && cycles < maxCycles) { TRUE_KERNEL_CH81.cycle(); cycles++; }
	if (TRUE_KERNEL_CH81.ch8Mode) {
		if (TRUE_KERNEL_CH81.dt > 0) TRUE_KERNEL_CH81.dt--;
		if (TRUE_KERNEL_CH81.st > 0) TRUE_KERNEL_CH81.st--;
	}
}
function renderCH81() {
	if (TRUE_KERNEL_CH81.ch8Mode) {
		LGC.setColor("#000");
		LGC.clear();
		LGC.ctx.fillStyle = SYSTEM.colorMode ? "#FFF" : "#0f0";
		let startY = 16;
		for (let y = 0; y < 32; y++) {
			for (let x = 0; x < 64; x++) {
				if (TRUE_KERNEL_CH81.vram[x + (y * 64)]) {
					LGC.rawRect(x * 2, startY + y * 2, 2, 2);
				}
			}
		}
	}
}

	const url = window.URL.createObjectURL(blob);
	const a = document.createElement('a'); a.style.display = 'none'; a.href = url; a.download = filename;
	document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url); document.body.removeChild(a);
}

		this.ctx.save(); this.ctx.translate(Math.floor(x), Math.floor(y)); this.ctx.rotate(rot);
		this.ctx.beginPath(); this.ctx.moveTo(Math.floor(pts[0]*scale)+0.5, Math.floor(pts[1]*scale)+0.5);
		for (let i = 2; i < pts.length; i += 2) this.ctx.lineTo(Math.floor(pts[i]*scale)+0.5, Math.floor(pts[i+1]*scale)+0.5);
		this.ctx.stroke(); this.ctx.restore();
	},
	project3D: function(x, y, z, fov = 100, camZ = 0) {
		let dz = z - camZ; if (dz <= 0) return null; let scale = fov / dz;
		return { x: (this.width/2) + (x * scale), y: (this.height/2) + (y * scale), scale: scale };
	},

	bresenhamLine: function(x0, y0, x1, y1) {
		this.checkLimit(); x0=Math.floor(x0); y0=Math.floor(y0); x1=Math.floor(x1); y1=Math.floor(y1);
		let dx = Math.abs(x1 - x0), dy = -Math.abs(y1 - y0);
		let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1; let err = dx + dy, e2;
		while(true) {
			this.ctx.fillRect(x0, y0, 1, 1);
			if(x0 === x1 && y0 === y1) break;
			e2 = 2 * err;
			if(e2 >= dy) { err += dy; x0 += sx; }
			if(e2 <= dx) { err += dx; y0 += sy; }
		}
	},
	bresenhamCircle: function(xc, yc, r) {
		this.checkLimit(); xc=Math.floor(xc); yc=Math.floor(yc); r=Math.floor(r);
		let x = -r, y = 0, err = 2-2*r;
		do {
			this.ctx.fillRect(xc-x, yc+y, 1, 1); this.ctx.fillRect(xc-y, yc-x, 1, 1);
			this.ctx.fillRect(xc+x, yc-y, 1, 1); this.ctx.fillRect(xc+y, yc+x, 1, 1);
			r = err; if(r <= y) err += ++y*2+1; if(r > x || err > y) err += ++x*2+1;
		} while(x < 0);
	},
	fillBresenhamCircle: function(xc, yc, r) {
		this.checkLimit(); xc=Math.floor(xc); yc=Math.floor(yc); r=Math.floor(r);
		for(let y=-r; y<=r; y++) {
			for(let x=-r; x<=r; x++) { if(x*x+y*y <= r*r) this.ctx.fillRect(xc+x, yc+y, 1, 1); }
		}
	},
	checkerboard: function(x, y, w, h, size, hexC1, hexC2) {
		this.checkLimit(); this.ctx.save();
		for(let i=0; i<w; i+=size) {
			for(let j=0; j<h; j+=size) {
				this.ctx.fillStyle = ((i/size + j/size) % 2 === 0) ? hexC1 : hexC2;
				this.ctx.fillRect(Math.floor(x+i), Math.floor(y+j), size, size);
			}
		} this.ctx.restore();
	},
	noise: function(x, y, w, h, density) {
		this.checkLimit(); this.ctx.fillStyle = this.color;
		for(let i=0; i<w; i++) {
			for(let j=0; j<h; j++) { if(Math.random() < density) this.ctx.fillRect(Math.floor(x+i), Math.floor(y+j), 1, 1); }
		}
	},
	retroShadowRect: function(x, y, w, h, shadowColor, offsetX, offsetY) {
		this.checkLimit(); let tmp = this.ctx.fillStyle; this.ctx.fillStyle = shadowColor;
		this.ctx.fillRect(Math.floor(x+offsetX), Math.floor(y+offsetY), Math.floor(w), Math.floor(h));
		this.ctx.fillStyle = tmp; this.ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
	},
	scanlineFill: function(x, y, w, h, spacing) {
		this.checkLimit(); this.ctx.fillStyle = this.color;
		for(let j=0; j<h; j+=spacing) { this.ctx.fillRect(Math.floor(x), Math.floor(y+j), Math.floor(w), 1); }
	},
	draw3DPlane: function(camX, camY, camZ, pitch, angle, horizon, hexC1, hexC2) {
		this.checkLimit(); this.ctx.save(); let sinA = Math.sin(angle), cosA = Math.cos(angle);
		for(let y = horizon; y < this.height; y++) {
			let z = (y - horizon) + 1; let pz = camZ / z;
			let rowX = -camX + (pz * cosA) * pitch; let rowY = -camY + (pz * sinA) * pitch;
			let stepX = (pz * -sinA) / this.width * pitch; let stepY = (pz * cosA) / this.width * pitch;
			for(let x = 0; x < this.width; x++) {
				let tx = Math.floor(rowX) & 7; let ty = Math.floor(rowY) & 7;
				this.ctx.fillStyle = ((tx^ty)&4) ? hexC1 : hexC2;
				this.ctx.fillRect(x, y, 1, 1);
				rowX += stepX; rowY += stepY;
			}
		} this.ctx.restore();
	},
	drawWireCube: function(cx, cy, cz, size, pitch, yaw, roll) {
		this.checkLimit(); let s = size/2;
		let pts = [[-s,-s,-s], [s,-s,-s], [s,s,-s], [-s,s,-s], [-s,-s,s], [s,-s,s], [s,s,s], [-s,s,s]];
		let sp = Math.sin(pitch), cp = Math.cos(pitch); let sYaw = Math.sin(yaw), cYaw = Math.cos(yaw); let sr = Math.sin(roll), cr = Math.cos(roll);
		let proj = [];
		for(let p of pts) {
			let x1 = p[0]*cr - p[1]*sr, y1 = p[0]*sr + p[1]*cr, z1 = p[2];
			let x2 = x1*cYaw + z1*sYaw, y2 = y1, z2 = -x1*sYaw + z1*cYaw;
			let x3 = x2, y3 = y2*cp - z2*sp, z3 = y2*sp + z2*cp;
			let pt = this.project3D(x3, y3, z3+cz, 150, 0);
			if(pt) proj.push(pt); else proj.push({x:0, y:0});
		}
		let edges = [[0,1],[1,2],[2,3],[3,0], [4,5],[5,6],[6,7],[7,4], [0,4],[1,5],[2,6],[3,7]];
		for(let e of edges) this.bresenhamLine(proj[e[0]].x, proj[e[0]].y, proj[e[1]].x, proj[e[1]].y);
	},
	drawStarfield: function(starsArr, speed) {
		this.checkLimit(); this.ctx.fillStyle = this.color;
		for(let s of starsArr) {
			s.z -= speed; if(s.z <= 0) { s.x = (Math.random()-0.5)*1000; s.y = (Math.random()-0.5)*1000; s.z = 100; }
			let p = this.project3D(s.x, s.y, s.z, 50, 0);
			if(p && p.x>=0 && p.x<=this.width && p.y>=0 && p.y<=this.height) this.ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 1, 1);
		}
	},
	draw1BitImage: function(x, y, hexStr, w, h, colorOn, colorOff) {
		this.checkLimit(); this.ctx.save(); let ptr = 0;
		for(let j=0; j<h; j++) {
			for(let i=0; i<w; i++) {
				if(ptr >= hexStr.length) break;
				let val = parseInt(hexStr[ptr], 16);
				for(let bit=3; bit>=0; bit--) {
					if(i < w) {
						this.ctx.fillStyle = ((val >> bit) & 1) ? colorOn : colorOff;
						if (this.ctx.fillStyle !== 'transparent') this.ctx.fillRect(Math.floor(x+i), Math.floor(y+j), 1, 1);
						i++;
					}
				} ptr++; i--; 
			}
		} this.ctx.restore();
	},
	drawRotatedSprite: function(x, y, hexData, w, h, angle, ignoreBlack=true, scale=1) {
		this.checkLimit(); this.ctx.save();
		this.ctx.translate(Math.floor(x + (w*scale)/2), Math.floor(y + (h*scale)/2));
		this.ctx.rotate(angle); this.ctx.translate(Math.floor(-(w*scale)/2), Math.floor(-(h*scale)/2));
		this.drawSprite(0, 0, hexData, w, h, ignoreBlack, scale);
		this.ctx.restore();
	},
	drawLMV: function(frameStr, startX = 0, startY = 0, drawWidth = 128, ignoreBlack = false, scale = 1) {
		if (!frameStr) return; this.checkLimit();
		let parts = frameStr.split(','); let ptr = 0; const pW = this.width / 128; const pH = this.height / 96;
		for(let p of parts) {
			if(!p) continue;
			let cIdx = parseInt(p[0], 16); let count = parseInt(p.substring(1), 16); let isTransp = ignoreBlack && cIdx === 0;
			if (!isTransp) this.ctx.fillStyle = LMV_COLORS_HEX[cIdx];
			while(count > 0) {
				let x = ptr % drawWidth; let y = Math.floor(ptr / drawWidth);
				let spaceLeftInRow = drawWidth - x; let drawLen = Math.min(count, spaceLeftInRow);
				if (!isTransp) this.rawRect((startX + x * scale) * pW, (startY + y * scale) * pH, drawLen * scale * pW, scale * pH);
				ptr += drawLen; count -= drawLen;
			}
		}
		this.ctx.fillStyle = this.color; 
	},
	drawPlasma: function(x, y, w, h, time) {
		this.checkLimit();
		for(let i=0; i<w; i+=2) {
			for(let j=0; j<h; j+=2) {
				let v = Math.sin((i+time)/10) + Math.sin((j+time)/10) + Math.sin((i+j+time)/10);
				let cIdx = Math.floor(Math.abs(v)*3) % 16;
				this.ctx.fillStyle = LMV_COLORS_HEX[cIdx];
				this.ctx.fillRect(Math.floor(x+i), Math.floor(y+j), 2, 2);
			}
		}
	},
	drawTunnel: function(cx, cy, w, h, time) {
		this.checkLimit();
		for (let i=0; i<w; i+=4) {
			for (let j=0; j<h; j+=4) {
				let dx = i - w/2; let dy = j - h/2; let dist = Math.sqrt(dx*dx + dy*dy); let angle = Math.atan2(dy, dx);
				let v = Math.sin(dist/5 - time/5) + Math.cos(angle*3 + time/10); let cIdx = Math.abs(Math.floor(v * 4)) % 16;
				this.ctx.fillStyle = LMV_COLORS_HEX[cIdx]; this.ctx.fillRect(Math.floor(cx-w/2+i), Math.floor(cy-h/2+j), 4, 4);
			}
		}
	},
	drawFire: function(x, y, w, h, time) {
		this.checkLimit();
		for(let i=0; i<w; i+=2) {
			for(let j=0; j<h; j+=2) {
				let v = Math.sin((i+time)/5) * Math.cos((j-time)/3) + Math.sin((i+j)/10);
				let palette = [4, 10, 7, 0]; let cIdx = palette[Math.abs(Math.floor(v * 2)) % 4];
				this.ctx.fillStyle = LMV_COLORS_HEX[cIdx]; this.ctx.fillRect(Math.floor(x+i), Math.floor(y+j), 2, 2);
			}
		}
	},
	drawStatic: function(x, y, w, h) {
		this.checkLimit();
		for(let i=0; i<w; i+=2) {
			for(let j=0; j<h; j+=2) {
				let cIdx = Math.random() > 0.5 ? 3 : 0; 
				this.ctx.fillStyle = LMV_COLORS_HEX[cIdx]; this.ctx.fillRect(Math.floor(x+i), Math.floor(y+j), 2, 2);
			}
		}
	},
	drawConcentric: function(cx, cy, maxR, step, colorsArr) {
		this.checkLimit(); let cIdx = 0;
		for(let r = maxR; r > 0; r -= step) {
			this.ctx.fillStyle = colorsArr[cIdx % colorsArr.length];
			this.ctx.beginPath(); this.ctx.arc(cx, cy, r, 0, Math.PI*2); this.ctx.fill();
			cIdx++;
		}
	},
	drawIsometricTile: function(x, y, size, topHex, leftHex, rightHex) {
		this.checkLimit(); let h = size * 0.5; let w = size * 0.866;
		this.ctx.fillStyle = topHex; this.fillPolygon([x, y-h, x+w, y, x, y+h, x-w, y]);
		this.ctx.fillStyle = leftHex; this.fillPolygon([x-w, y, x, y+h, x, y+h+size, x-w, y+size]);
		this.ctx.fillStyle = rightHex; this.fillPolygon([x, y+h, x+w, y, x+w, y+size, x, y+h+size]);
	},
	drawLGM: function(mode, camX, camY, camZ, pitch, angle, horizon, time) {
		this.checkLimit(); this.ctx.save(); let sinA = Math.sin(angle), cosA = Math.cos(angle);
		for(let y = horizon; y < this.height; y+=2) {
			let z = (y - horizon) + 1; let pz = camZ / z; 
			let rowX = -camX + (pz * cosA) * pitch; let rowY = -camY + (pz * sinA) * pitch; 
			let stepX = ((pz * -sinA) / this.width * pitch) * 2; let stepY = ((pz * cosA) / this.width * pitch) * 2;
			for(let x = 0; x < this.width; x+=2) { 
				let tx = Math.floor(rowX); let ty = Math.floor(rowY); let cIdx = 0;
				if (mode === 0) { cIdx = ((tx&7)^(ty&7))&4 ? 3 : 0; }
				else if (mode === 1) { let v = Math.sin((tx+time)/10) + Math.sin((ty+time)/10) + Math.sin((tx+ty+time)/10); cIdx = Math.floor(Math.abs(v)*3) % 16; }
				else if (mode === 2) { let v = Math.sin((tx+time)/5) * Math.cos((ty-time)/3) + Math.sin((tx+ty)/10); let pal = [4, 10, 7, 0]; cIdx = pal[Math.abs(Math.floor(v * 2)) % 4]; }
				else if (mode === 3) { cIdx = Math.random() > 0.5 ? 3 : 0; }
				else if (mode === 4) { let d = Math.sqrt(tx*tx + ty*ty); let ang = Math.atan2(ty, tx); let v = Math.sin(d/5 - time/5) + Math.cos(ang*3 + time/10); cIdx = Math.abs(Math.floor(v * 4)) % 16; }
				this.ctx.fillStyle = LMV_COLORS_HEX[cIdx]; this.ctx.fillRect(x, y, 2, 2); rowX += stepX; rowY += stepY; 
			}
		} this.ctx.restore();
	}
};

const LINE_STORAGE = {
	sig: "CH81_LS_VM_SIG_V2",
	volatile: {}, 
	init: function() {
		if (SYSTEM.localStorageEnabled) {
			let data = localStorage.getItem('ZLINE_OS_STORAGE');
			if (data && !data.startsWith(this.sig)) { 
				console.warn("KERNEL: Unauthorized un-signed local storage."); 
				localStorage.removeItem('ZLINE_OS_STORAGE'); 
			} else if (data) {
				try { this.volatile = JSON.parse(data.substring(this.sig.length + 1)); } catch(e) {}
			}
		}
	},
	saveAll: function() {
		if (!SYSTEM.localStorageEnabled) return;
		let finalSave = this.sig + ":" + JSON.stringify(this.volatile);
		localStorage.setItem('ZLINE_OS_STORAGE', finalSave);
	},
	save: function(key, value) { this.volatile[key] = value; this.saveAll(); },
	load: function(key) { return this.volatile[key]; },
	loadAll: function() { return this.volatile; },
	remove: function(key) { delete this.volatile[key]; this.saveAll(); },
	delete: function() { 
		this.volatile = {};
		if (SYSTEM.localStorageEnabled) localStorage.removeItem('ZLINE_OS_STORAGE'); 
	},
	exportStr: function() { return !SYSTEM.localStorageEnabled ? "" : (localStorage.getItem('ZLINE_OS_STORAGE') || ""); },
	importStr: function(str) { 
		if (!SYSTEM.localStorageEnabled) return false;
		if(str && str.startsWith(this.sig)) { localStorage.setItem('ZLINE_OS_STORAGE', str); this.init(); return true; } 
		return false; 
	}
};

window.progression_save_data = function(lockId, dataObj) {
	let dataStr = typeof dataObj === 'string' ? dataObj : JSON.stringify(dataObj);
	let h = 0;
	for(let i=0; i<dataStr.length; i++) { h = ((h << 5) - h) + dataStr.charCodeAt(i); h |= 0; }
	let hash8 = Math.abs(h).toString().padStart(8, '1').substring(0, 8);
	let payloadStr = JSON.stringify({ data: dataObj, hash: hash8 });
	LINE_STORAGE.save("PROG_" + lockId, "LMT::" + encodeLMT(payloadStr));
};

window.progression_lock = function(lockId) {
	let raw = LINE_STORAGE.load("PROG_" + lockId);
	if (!raw) return { locked: true, data: null };
	let payload;
	if (typeof raw === 'string' && raw.startsWith("LMT::")) {
		try { payload = JSON.parse(decodeLMT(raw.substring(5))); } catch(e) { return { locked: true, error: true }; }
	} else {
		payload = raw; 
	}
	
	if(payload && payload.hash) {
		let dataStr = typeof payload.data === 'string' ? payload.data : JSON.stringify(payload.data);
		let h = 0; for(let i=0; i<dataStr.length; i++) { h = ((h << 5) - h) + dataStr.charCodeAt(i); h |= 0; }
		let expectedHash = Math.abs(h).toString().padStart(8, '1').substring(0, 8);
		
		let currentPayload = window.__current_payload || "";
		let strictMatches = currentPayload.match(/progression_lock/g);
		let strictAntiCheat = strictMatches && strictMatches.length >= 2;
		
		if (payload.hash !== expectedHash) {
			if(strictAntiCheat) {
				SYSTEM.panic("PROGRESSION LOCK: TAMPERED SAVE");
			}
			return { locked: true, error: true };
		}
		return { locked: false, data: payload.data };
	}
	return { locked: false, data: payload }; 
};

window.applyLineLanguage = function(content) {
	if (content.includes('[ENGINE SOURCE CODE]')) {
		return content.replace(/\[ENGINE SOURCE CODE\]([\s\S]*?)\[\/ENGINE SOURCE CODE\]/gi, (match, innerCode) => {
			let converted = innerCode
				.replace(/\bconst\b/g, 'section')
				.replace(/\bFunction\b/g, 'collect')
				.replace(/\bfunction\b/g, 'collect')
				.replace(/\blet\b/g, 'allow');
			return '[ENGINE SOURCE CODE]' + converted + '[/ENGINE SOURCE CODE]';
		});
	} return content;
};

function updateRemapper() {
	if (REMAPPER_APP.listening) return;
	if (inputs.back && !prevInputs.back) { TRUE_KERNEL_8CHIPI.sysCall_Yield(); return; }
	let limit = REMAPPER_APP.actions.length;
	if ((inputs.up || inputs.w) && !(prevInputs.up || prevInputs.w)) REMAPPER_APP.cursor = Math.max(0, REMAPPER_APP.cursor - 1);
	if ((inputs.down || inputs.s) && !(prevInputs.down || prevInputs.s)) REMAPPER_APP.cursor = Math.min(limit - 1, REMAPPER_APP.cursor + 1);
	let actionPressed = (inputs.a && !prevInputs.a) || (inputs.space && !prevInputs.space) || (inputs.y && !prevInputs.y) || (inputs.c && !prevInputs.c);
	if (actionPressed) { REMAPPER_APP.listening = true; }
}

const SAV_MAN = { cursor: 0, offset: 0, viewMode: false, viewKey: "", viewText: [], scrollY: 0 };
function launchSavManager() { TRUE_KERNEL_8CHIPI.sysCall_Exec('SAV_MANAGER', null, () => { SYSTEM.state = 'SAV_MANAGER'; uiLayer.style.display = 'none'; SAV_MAN.cursor = 0; SAV_MAN.offset = 0; SAV_MAN.viewMode = false; }); }

function updateSavManager() {
	let data = LINE_STORAGE.loadAll() || {};
	let keys = Object.keys(data);
	if (SAV_MAN.viewMode) {
		if (inputs.back && !prevInputs.back) { SAV_MAN.viewMode = false; return; }
		if ((inputs.up || inputs.w) && !(prevInputs.up || prevInputs.w)) SAV_MAN.scrollY = Math.max(0, SAV_MAN.scrollY - 1);
		if ((inputs.down || inputs.s) && !(prevInputs.down || prevInputs.s)) SAV_MAN.scrollY = Math.min(Math.max(0, SAV_MAN.viewText.length - 6), SAV_MAN.scrollY + 1);
		return;
	}

	let maxItems = keys.length > 0 ? keys.length + 1 : 1; 
	if ((inputs.up || inputs.w) && !(prevInputs.up || prevInputs.w)) SAV_MAN.cursor = Math.max(0, SAV_MAN.cursor - 1); 
	if ((inputs.down || inputs.s) && !(prevInputs.down || prevInputs.s)) SAV_MAN.cursor = Math.min(maxItems - 1, SAV_MAN.cursor + 1);
	
	let actionPressed = (inputs.a && !prevInputs.a) || (inputs.b && !prevInputs.b) || (inputs.y && !prevInputs.y) || (inputs.space && !prevInputs.space);
	let optPressed = (inputs.c && !prevInputs.c);

	if (actionPressed && keys.length > 0) {
		if (SAV_MAN.cursor < keys.length) {
			SAV_MAN.viewMode = true;
			SAV_MAN.viewKey = keys[SAV_MAN.cursor];
			SAV_MAN.scrollY = 0;
			let rawData = data[SAV_MAN.viewKey];
			let displayStr = "NULL";
			if (typeof rawData === 'string' && rawData.startsWith("LMT::")) {
				try { 
					let decoded = decodeLMT(rawData.substring(5)); 
					displayStr = JSON.stringify(JSON.parse(decoded), null, 2);
				} catch(e) { displayStr = rawData; }
			} else {
				displayStr = JSON.stringify(rawData, null, 2) || "NULL";
			}
			
			SAV_MAN.viewText = [];
			let lines = displayStr.split('\n');
			for (let l of lines) {
				let currentLine = '';
				for (let char of l) {
					if (LGC.measureText(currentLine + char).width > LGC.width - 4) {
						SAV_MAN.viewText.push(currentLine); currentLine = char;
					} else { currentLine += char; }
				}
				if (currentLine) SAV_MAN.viewText.push(currentLine);
			}
		} else if (SAV_MAN.cursor === keys.length) {
			LINE_STORAGE.delete(); SAV_MAN.cursor = 0; 
		}
	} else if (optPressed && keys.length > 0 && SAV_MAN.cursor < keys.length) {
		let keyToDel = keys[SAV_MAN.cursor];
		delete data[keyToDel];
		let encoded = encodeLMT(JSON.stringify(data));
		localStorage.setItem('ZLINE_OS_STORAGE', LINE_STORAGE.sig + ":" + encoded);
		if (SAV_MAN.cursor >= Object.keys(data).length) SAV_MAN.cursor = Math.max(0, Object.keys(data).length - 1);
	}
}

function renderSavManager() {
	LGC.setColor(SYSTEM.colorMode ? "#FFF" : "#b4b4b4"); LGC.clear(); LGC.setColor(SYSTEM.colorMode ? "#000" : "#111");
	LGC.setFont("bold 10px monospace"); LGC.text("LOCAL STORAGE (SAV)", 2, 10); LGC.line(0, 12, LGC.width, 12);
	LGC.setFont("10px monospace"); 

	if (SAV_MAN.viewMode) {
		LGC.text(`VIEW: ${SAV_MAN.viewKey.substring(0,10)}`, 2, 22);
		LGC.line(0, 24, LGC.width, 24);
		LGC.setFont("8px monospace");
		let y = 34;
		for(let i = SAV_MAN.scrollY; i < Math.min(SAV_MAN.viewText.length, SAV_MAN.scrollY + 6); i++) {
			LGC.text(SAV_MAN.viewText[i], 2, y); y+=9;
		}
		LGC.text("ESC: BACK", 2, LGC.height - 4);
		return;
	}

	let data = LINE_STORAGE.loadAll() || {};
	let keys = Object.keys(data);
	let y = 25; let displayLimit = 5;
	
	if (keys.length === 0) { LGC.text("NO SAVE DATA FOUND.", 5, 30); return; }
	if (SAV_MAN.cursor < SAV_MAN.offset) SAV_MAN.offset = SAV_MAN.cursor; 
	if (SAV_MAN.cursor >= SAV_MAN.offset + displayLimit) SAV_MAN.offset = SAV_MAN.cursor - displayLimit + 1;
	
	let renderCount = 0;
	for(let i = SAV_MAN.offset; i < keys.length && renderCount < displayLimit; i++) {
		let prefix = (i === SAV_MAN.cursor ? "> " : "  ");
		LGC.text(`${prefix}${keys[i].substring(0, 15)}`, 2, y); y += 10; renderCount++;
	}
	if (renderCount < displayLimit && SAV_MAN.offset <= keys.length) {
		if (keys.length >= SAV_MAN.offset && renderCount < displayLimit) { 
			LGC.text((SAV_MAN.cursor === keys.length ? "> " : "  ") + "FORMAT SYSTEM", 2, y); y+=10; renderCount++; 
		}
	}
	LGC.setFont("8px monospace");
	LGC.text("Z:VIEW C:DEL ESC:BACK", 2, LGC.height - 4);
}

function generateCenteredLMP(asciiArr, scale, bgHex) {
	let pixels = new Array(128*96).fill(bgHex);
	let sw = asciiArr[0].length; let sh = asciiArr.length;
	let startX = Math.floor((128 - (sw * scale)) / 2);
	let startY = Math.floor((96 - (sh * scale)) / 2);
	for (let y = 0; y < sh; y++) {
		for (let x = 0; x < sw; x++) {
			let c = asciiArr[y][x];
			if (c !== '.') {
				for(let sy=0; sy<scale; sy++) {
					for(let sx=0; sx<scale; sx++) {
						let px = startX + x*scale + sx; let py = startY + y*scale + sy;
						if (px>=0 && px<128 && py>=0 && py<96) pixels[py * 128 + px] = c;
					}
				}
			}
		}
	}
	let out = ""; let lastColor = pixels[0]; let count = 0;
	for(let i=0; i<pixels.length; i++) {
		if (pixels[i] === lastColor && count < 255) count++;
		else { out += lastColor + count.toString(16).toUpperCase() + ","; lastColor = pixels[i]; count = 1; }
	}
	if (count > 0) out += lastColor + count.toString(16).toUpperCase() + ",";
	return out;
}

2,f1:146,f2:146,d:150}, {t:2,f1:165,f2:165,d:150}, null, {t:2,f1:146,f2:146,d:100}, null ]\n];\nallow bSpeeds = [10, 8, 12];\n\nallow cursor = 0;\nallow scrollCol = 0;\nallow pBeat = -1;\nallow bTick = 0;\nallow bStep = 0;\n\nwindow.launchROM_SOUNDPAD = collect(payload) {\n\tSYSTEM.state = 'APP';\n\tSYSTEM.activeApp = {\n\t\tupdate: collect() {\n\t\t\tif (inputs.back && !prevInputs.back) { TRUE_KERNEL_8CHIPI.sysCall_Yield(); return; }\n\t\t\tallow r = Math.floor(cursor / 8); allow c = cursor % 8;\n\t\t\tif (inputs.left && !prevInputs.left) c = (c - 1 + 8) % 8;\n\t\t\tif (inputs.right && !prevInputs.right) c = (c + 1) % 8;\n\t\t\tif (inputs.up && !prevInputs.up) r = (r - 1 + 4) % 4;\n\t\t\tif (inputs.down && !prevInputs.down) r = (r + 1) % 4;\n\t\t\tcursor = r * 8 + c;\n\t\t\t\n\t\t\tif (c < scrollCol) scrollCol = c;\n\t\t\tif (c >= scrollCol + 4) scrollCol = c - 3;\n\n\t\t\tif ((inputs.a && !prevInputs.a) || (inputs.space && !prevInputs.space) || (inputs.y && !prevInputs.y) || (inputs.b && !prevInputs.b)) {\n\t\t\t\tallow item = grid[cursor];\n\t\t\t\tif (item.isBeat) {\n\t\t\t\t\tif (item.idx === 3) { pBeat = -1; }\n\t\t\t\t\telse { pBeat = item.idx; bTick = 0; bStep = 0; }\n\t\t\t\t} else {\n\t\t\t\t\tLINEPAD.play(item.t, item.f1, item.d, 0.5, item.f2);\n\t\t\t\t}\n\t\t\t}\n\n\t\t\tif (pBeat >= 0) {\n\t\t\t\tbTick++;\n\t\t\t\tif (bTick >= bSpeeds[pBeat]) {\n\t\t\t\t\tbTick = 0;\n\t\t\t\t\tallow seq = beats[pBeat];\n\t\t\t\t\tallow note = seq[bStep];\n\t\t\t\t\tif (note !== null) {\n\t\t\t\t\t\tLINEPAD.play(note.t, note.f1, note.d, 0.5, note.f2);\n\t\t\t\t\t}\n\t\t\t\t\tbStep = (bStep + 1) % seq.length;\n\t\t\t\t}\n\t\t\t}\n\t\t},\n\t\trender: collect() {\n\t\t\tLGC.setColor("#111"); LGC.clear();\n\t\t\tLGC.setColor("#FFF"); LGC.setFont("bold 10px monospace"); LGC.text("LINEPAD 8-BIT SYNTH", 10, 15);\n\t\t\t\n\t\t\tif (scrollCol > 0) LGC.text("<", 2, 45);\n\t\t\tif (scrollCol < 4) LGC.text(">", 120, 45);\n\n\t\t\tfor (allow i=0; i<32; i++) {\n\t\t\t\tallow row = Math.floor(i/8); allow col = i % 8;\n\t\t\t\tif (col >= scrollCol && col < scrollCol + 4) {\n\t\t\t\t\tallow displayCol = col - scrollCol;\n\t\t\t\t\tallow px = 15 + displayCol * 26; allow py = 20 + row * 18;\n\t\t\t\t\tif (cursor === i) { LGC.setColor("#FFF"); LGC.rect(px-2, py-2, 24, 18); }\n\t\t\t\t\tLGC.setColor(grid[i].c); LGC.rect(px, py, 20, 14);\n\t\t\t\t\tLGC.setColor("#000"); LGC.setFont("bold 6px monospace"); \n\t\t\t\t\tallow label = grid[i].n;\n\t\t\t\t\tif (grid[i].isBeat && pBeat === grid[i].idx && Math.floor(Date.now()/200)%2===0) label = "PLY";\n\t\t\t\t\tLGC.text(label.substring(0,5), px+1, py+10);\n\t\t\t\t}\n\t\t\t}\n\t\t\tLGC.setColor("#FFF"); LGC.setFont("8px monospace");\n\t\t\tallow item = grid[cursor];\n\t\t\tif (!item.isBeat) {\n\t\t\t\tallow typeName = ["SQ","SAW","TRI","NOI"][item.t];\n\t\t\t\tLGC.text("W:"+typeName+" F:"+Math.floor(item.f1)+"->"+Math.floor(item.f2), 10, 95);\n\t\t\t} else {\n\t\t\t\tLGC.text(item.n + " SEQUENCE", 10, 95);\n\t\t\t}\n\t\t}\n\t};\n};\n[/ENGINE SOURCE CODE]\n========`;

function applySettings() {
	if (SYSTEM.resolution === 0) { canvas.width = 128; canvas.height = 96; } 
	else { canvas.width = 256; canvas.height = 192; } 
	LGC.updateDims(); 
	const scale = SYSTEM.dpi / 140;
	document.getElementById('screen-viewport').style.width = `${480 * scale}px`; 
	document.getElementById('screen-viewport').style.height = `${360 * scale}px`;
	uiLayer.style.fontSize = `${12 * scale}px`;
	const sl = document.getElementById('scanlines'); 
	if(SYSTEM.scanlines) sl.classList.remove('hidden'); else sl.classList.add('hidden');
	
	canvas.style.filter = SYSTEM.colorMode ? "none" : "grayscale(100%)";
	canvas.style.webkitFilter = SYSTEM.colorMode ? "none" : "grayscale(100%)";

	const hwSpecDisplay = document.getElementById('hardware-display');
	if (hwSpecDisplay) {
		if (SYSTEM.chipMode === 2) hwSpecDisplay.innerText = "CRT CHIP (16-BIT) | 256KB RAM | LGC GPU | VIRTUAL KERNEL";
		else if (SYSTEM.chipMode === 1) hwSpecDisplay.innerText = "CRT CHIP (16-BIT) | 128KB RAM | LGC GPU | VIRTUAL KERNEL";
		else hwSpecDisplay.innerText = "Z80 CHIP (8-BIT) | 64KB RAM | LGC GPU | VIRTUAL KERNEL";
	}

	if (SYSTEM.screenOnly) {
		document.body.classList.add('screen-only-active');
	} else {
		document.body.classList.remove('screen-only-active');
	}
}

function compileBASICtoCH81(code) {
	let lines = code.split('\n').map(l => l.trim().toUpperCase()).filter(l => l.length > 0); let bytecode = []; let labels = {}; let unresolvedJumps = []; let offset = 0x0200; 
	const getReg = (v) => { if(v>='A' && v<='G') return v.charCodeAt(0) - 65; return 0; };
	const supportedCmds = ['CLS', 'UPDATE', 'HALT', 'LET', 'ADD', 'SUB', 'PSET', 'DRAW', 'GOTO', 'IF', 'RND', 'KEY', 'COL', 'RECT', 'LMV'];
	for(let line of lines) {
		let parts = line.split(/\s+/); let lineNum = parseInt(parts[0]);
		if (!isNaN(lineNum)) { labels[lineNum] = offset; parts.shift(); }
		if (parts.length === 0) continue;
		let cmd = parts[0]; if (!supportedCmds.includes(cmd)) throw new Error(`UNSUPPORTED KEYWORD: ${cmd}`);
		if (cmd === 'CLS') { bytecode.push(0xE1); offset += 1; } else if (cmd === 'UPDATE') { bytecode.push(0xE0); offset += 1; } else if (cmd === 'HALT') { bytecode.push(0xFF); offset += 1; } 
		else if (cmd === 'LET') { let reg = getReg(parts[1]); let val = parts[3]; if (val >= 'A' && val <= 'G') { bytecode.push(0x02, reg, getReg(val)); offset += 3; } else { bytecode.push(0x01, reg, parseInt(val)&0xFF); offset += 3; } } 
		else if (cmd === 'ADD') { let reg = getReg(parts[1].replace(',','')); let val = parts[2]; if (val >= 'A' && val <= 'G') { bytecode.push(0x10, reg, getReg(val)); offset += 3; } else { bytecode.push(0x11, reg, parseInt(val)&0xFF); offset += 3; } } 
		else if (cmd === 'SUB') { let reg = getReg(parts[1].replace(',','')); let reg2 = getReg(parts[2]); bytecode.push(0x12, reg, reg2); offset += 3; } 
		else if (cmd === 'PSET') { let rx = getReg(parts[1].replace(',','')); let ry = getReg(parts[2]); bytecode.push(0xE3, rx, ry); offset += 3; } 
		else if (cmd === 'DRAW') { let char = parts[1].replace(/["',]/g, ''); let rx = getReg(parts[2].replace(',','')); let ry = getReg(parts[3]); bytecode.push(0xE4, char.charCodeAt(0), rx, ry); offset += 4; } 
		else if (cmd === 'GOTO') { let target = parseInt(parts[1]); bytecode.push(0x20, 0x00, 0x00); unresolvedJumps.push({ idx: bytecode.length - 2, target: target }); offset += 3; } 
		else if (cmd === 'IF') { let reg = getReg(parts[1]); let val = parseInt(parts[3]); let target = parseInt(parts[5]); bytecode.push(0x30, reg, val&0xFF); offset += 3; bytecode.push(0x21, 0x00, 0x00); unresolvedJumps.push({ idx: bytecode.length - 2, target: target }); offset += 3; } 
		else if (cmd === 'RND') { let reg = getReg(parts[1].replace(',','')); let mask = parseInt(parts[2]); bytecode.push(0xC0, reg, mask&0xFF); offset += 3; } 
		else if (cmd === 'KEY') { let reg = getReg(parts[1]); bytecode.push(0x60, reg); offset += 2; }
		else if (cmd === 'COL') { let reg = getReg(parts[1]); bytecode.push(0xE2, reg); offset += 2; }
		else if (cmd === 'RECT') { let rx = getReg(parts[1].replace(',','')); let ry = getReg(parts[2].replace(',','')); let rw = getReg(parts[3].replace(',','')); let rh = getReg(parts[4]); bytecode.push(0xE5, rx, ry, rw, rh); offset += 5; }
		else if (cmd === 'LMV') { let p = parseInt(parts[1].replace(',','')); let rx = getReg(parts[2].replace(',','')); let ry = getReg(parts[3].replace(',','')); let rw = getReg(parts[4]); bytecode.push(0xE6, p, rx, ry, rw); offset += 5; }
	}
	for (let jmp of unresolvedJumps) { let addr = labels[jmp.target]; if (addr !== undefined) { bytecode[jmp.idx] = (addr >> 8) & 0xFF; bytecode[jmp.idx + 1] = addr & 0xFF; } }
	return bytecode.map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('');
};

function processRawAppBlock(blockStr) {
	let b = blockStr.trim(); if (!b) return null;
	let isEPRG = /eprg_install/i.test(b) && /eprg_verify/i.test(b) && /SYS_CALL:0x[0-9A-F]{4}/i.test(b);
	let runMatch = b.match(/run\(\s*([a-zA-Z0-9_]+)\s*\)/i);
	let exeCmd = runMatch ? runMatch[1].replace(/[^a-zA-Z0-9_]/g, '') : null;
	
	let title = "Unknown Program", label = "program", desc = "No description available.";
	let rawLines = b.split('\n'); let headerParsed = false;
	for (let i = 0; i < rawLines.length; i++) {
		let l = rawLines[i].replace(/\r/g, '').replace(/\xA0/g, ' '); let tLine = l.trim();
		if (!headerParsed && tLine.includes("(title)")) { 
			let titleMatch = tLine.match(/^(.*?)\(title\)/i); let labelMatch = tLine.match(/\(title\)\((.*?)\)/i); 
			if (titleMatch) title = titleMatch[1].trim(); if (labelMatch) label = labelMatch[1].trim(); 
			headerParsed = true; continue; 
		}
		if (tLine.startsWith("description(")) desc = tLine.substring(12, tLine.lastIndexOf(")"));
	}
	return { title, label, desc, payload: b, isEPRG, exeCmd };
}

function executeMediaPlayback(payload, type) {
	TRUE_KERNEL_8CHIPI.sysCall_Exec('MEDIA_PLAYER', null, () => {
		SYSTEM.state = 'APP'; let rawStr = payload.match(/\[LM[VP]_PAYLOAD\]([\s\S]*?)\[\/LM[VP]_PAYLOAD\]/i); let frames = rawStr ? rawStr[1].replace(/\s/g, '').split('|').filter(f => f) : [];
		SYSTEM.activeApp = {
			frames: frames, frameIdx: 0, fpsTimer: 0, playing: type === 'LMV', isPicture: type === 'LMP',
			update: function() {
				if (inputs.back && !prevInputs.back) { TRUE_KERNEL_8CHIPI.sysCall_Yield(); return; }
				if (!this.isPicture) {
					let actionPressed = (inputs.a && !prevInputs.a) || (inputs.b && !prevInputs.b) || (inputs.y && !prevInputs.y) || (inputs.c && !prevInputs.c);
					if (actionPressed) this.playing = !this.playing;
					if (this.playing) { this.fpsTimer++; if (this.fpsTimer > 6) { this.fpsTimer = 0; this.frameIdx++; if (this.frameIdx >= this.frames.length) this.frameIdx = 0; } } 
					else { if (inputs.left && !prevInputs.left) this.frameIdx = Math.max(0, this.frameIdx - 1); if (inputs.right && !prevInputs.right) this.frameIdx = Math.min(this.frames.length - 1, this.frameIdx + 1); }
				}
			},
			render: function() {
				LGC.setColor(SYSTEM.colorMode ? "#000" : "#111"); LGC.clear(); let fData = this.frames[this.frameIdx]; if (!fData) return;
				let parts = fData.split(','); let ptr = 0; const pW = LGC.width/128; const pH = LGC.height/96;
				for(let p of parts) {
					if(!p) continue; let cIdx = parseInt(p[0], 16); let count = parseInt(p.substring(1), 16); LGC.ctx.fillStyle = LMV_COLORS_HEX[cIdx];
					while(count > 0) { let x = ptr % 128; let y = Math.floor(ptr / 128); let spaceLeftInRow = 128 - x; let drawLen = Math.min(count, spaceLeftInRow); LGC.rawRect(x * pW, y * pH, drawLen * pW, pH); ptr += drawLen; count -= drawLen; }
				} LGC.ctx.fillStyle = LGC.color; if (!this.playing && !this.isPicture) { LGC.setColor("#FFF"); LGC.rect(0, 94, (this.frameIdx / Math.max(1, this.frames.length - 1)) * 128, 2); LGC.setFont("bold 8px monospace"); LGC.text("PAUSED", 2, 10); }
			}
		}; uiLayer.style.display = 'none'; LGC.updateDims();
	});
}

function encodeLMT(str) {
	let out = []; for (let i = 0; i < str.length; i++) { let c = str.charAt(i); if (/[a-z]/.test(c)) out.push(c.charCodeAt(0) - 96); else if (/[A-Z]/.test(c)) out.push(c.charCodeAt(0) - 64 + 26); else if (/[0-9]/.test(c)) out.push('n' + c); else if (c === ' ') out.push('SPC'); else if (c === '\n') out.push('NLN'); else if (c === '-') out.push('DSH'); else out.push('x' + c.charCodeAt(0).toString(16).toUpperCase()); } return out.join('-');
}

function decodeLMT(str) {
	let parts = str.split('-'); let res = "";
	for (let i = 0; i < parts.length; i++) { let p = parts[i]; if (!p) continue; if (p === 'SPC') res += ' '; else if (p === 'NLN') res += '\n'; else if (p === 'DSH') res += '-'; else if (p.startsWith('n')) res += p.substring(1); else if (p.startsWith('x')) res += String.fromCharCode(parseInt(p.substring(1), 16)); else if (/^\d+$/.test(p)) { let val = parseInt(p); if (val >= 1 && val <= 26) res += String.fromCharCode(val + 96); else if (val >= 27 && val <= 52) res += String.fromCharCode(val - 26 + 64); } else res += p; } return res;
}

	}

	let ch81Match = payload.match(/\[CH81_PAYLOAD\]([\s\S]*?)\[\/CH81_PAYLOAD\]/i);
	if (ch81Match && exeCmd) { window[`__SYS_MEM_${exeCmd}`] = ch81Match[1].replace(/\s/g, ''); tFunc = "launchNativeCH81"; }

	if (payload.includes("Board_identifier")) {
		window.LMF_BOARDS={}; window.LMF_RAW_BOARDS={}; let lines=payload.split('\n'); let cBoard=null; let bl=0; let rBoards={};
		for(let i=0;i<lines.length;i++){let pL=lines[i].replace(/\r/g,'').replace(/\xA0/g,' ').trim();if(!pL)continue;let bM=pL.match(/^Board\((\d+)\)/i);if(bM){cBoard=bM[1];rBoards[cBoard]="";}else if(cBoard&&bl<3){if(pL.toLowerCase()==='board_identifier'||pL.includes("run(")||pL.includes("========")||pL.includes("[ENGINE"))continue;rBoards[cBoard]+=pL+"\n";}}

		}
	}
	else if (SYSTEM.state === 'MEDIA_DONE') {
		let typeTag = MEDIA_MAKER_STATE.isVideo ? 'LMV' : 'LMP'; let virtualLMF = `${MEDIA_MAKER_STATE.appName || 'CUSTOM_MEDIA'} (title)(MEDIA)\nSYS_CALL:0x88A1\ndescription(Line Media Payload)\nrun(ROM_${typeTag})\n[${typeTag}_PAYLOAD]\n${MEDIA_MAKER_STATE.resultPayload}\n[/${typeTag}_PAYLOAD]\n========`;
		launchMediaPrompt(MEDIA_MAKER_STATE.appName || 'CUSTOM_MEDIA', typeTag.toLowerCase(), virtualLMF);
	}

	if (SYSTEM.state === 'APP' && SYSTEM.activeApp) {
		accumulator += deltaTime; if (accumulator > 200) accumulator = 200;
		while (accumulator >= 1000/60) { SYSTEM.activeApp.update(); accumulator -= 1000/60; } 
		try { SYSTEM.activeApp.render(); } catch (e) { if (e !== "LGC_LIMIT_EXCEEDED") console.error(e); }
		updateZ80Regs(); 
	}

	if (SYSTEM.notifTimer > 0) { LGC.setColor("rgba(0,0,0,0.8)"); LGC.rect(5, 5, LGC.width - 10, 15); LGC.setColor("#0f0"); LGC.setFont("bold 8px monospace"); LGC.text(SYSTEM.notification, 10, 15); SYSTEM.notifTimer--; }

	Object.keys(inputs).forEach(k => prevInputs[k] = inputs[k]); requestAnimationFrame(mainLoop);
}

boot();
</script>
</body>
</html>
